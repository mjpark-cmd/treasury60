<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그룹 통합 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  :root {
    --sans: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --serif: 'Instrument Serif', Georgia, serif;
    --bg: #f4f6fa;
    --sidebar-bg: #1a2544;
    --sidebar-bg-hover: #243561;
    --sidebar-bg-active: #2c3d6e;
    --sidebar-text: #c6cfe0;
    --sidebar-text-muted: rgba(255,255,255,0.4);
    --sidebar-text-active: #ffffff;
    --sidebar-accent: #d4a017;
    --sidebar-divider: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--sans); background: var(--bg); color: #1a2544; overflow: hidden; height: 100vh; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: #c6cfe0; border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: #9ba8c4; }

  .layout { display: flex; height: 100vh; width: 100vw; }
  .sidebar {
    width: 80px; flex-shrink: 0; background: var(--sidebar-bg);
    color: var(--sidebar-text); display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 18px 0 14px 0; border-bottom: 1px solid var(--sidebar-divider);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .brand-mark {
    font-family: var(--serif); font-style: italic; font-size: 22px;
    color: #fff; line-height: 1; letter-spacing: -0.02em;
  }
  .brand-sub {
    font-size: 8px; color: var(--sidebar-accent); letter-spacing: 0.2em;
    text-transform: uppercase; font-weight: 600;
  }
  .sidebar-nav { flex: 1; padding: 12px 6px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 14px 6px; cursor: pointer; color: var(--sidebar-text);
    border-radius: 8px; transition: background 0.15s, color 0.15s; user-select: none; position: relative;
  }
  .nav-item:hover { background: var(--sidebar-bg-hover); color: var(--sidebar-text-active); }
  .nav-item.active { background: var(--sidebar-bg-active); color: var(--sidebar-text-active); }
  .nav-item.active::before {
    content: ''; position: absolute; left: -6px; top: 14px; bottom: 14px;
    width: 3px; background: var(--sidebar-accent); border-radius: 0 2px 2px 0;
  }
  .nav-icon { font-size: 22px; line-height: 1; }
  .nav-label { font-size: 10px; font-weight: 500; text-align: center; line-height: 1.2; }
  .sidebar-footer {
    padding: 12px 8px 14px 8px; border-top: 1px solid var(--sidebar-divider);
    text-align: center; font-size: 9px; color: var(--sidebar-text-muted); letter-spacing: 0.05em;
  }

  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); min-width: 0; }
  .frame-container { flex: 1; overflow: hidden; position: relative; }
  .module-frame { width: 100%; height: 100%; border: none; display: none; }
  .module-frame.active { display: block; }
  .loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #6b7a99; font-size: 13px; background: var(--bg); z-index: 10;
  }
  .loading.hidden { display: none; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #e2e7f0;
    border-top-color: var(--sidebar-accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="brand-mark">G</span>
      <span class="brand-sub">Group</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-module="treasury" onclick="switchModule('treasury')" title="자금관리">
        <span class="nav-icon">💼</span>
        <span class="nav-label">자금관리</span>
      </div>
      <div class="nav-item" data-module="finance" onclick="switchModule('finance')" title="재무·손익">
        <span class="nav-icon">📊</span>
        <span class="nav-label">재무·손익</span>
      </div>
    </nav>
    <div class="sidebar-footer">v1</div>
  </aside>

  <main class="content">
    <div class="frame-container">
      <div class="loading" id="loadingTreasury"><div class="spinner"></div>자금관리 모듈 로딩 중...</div>
      <div class="loading hidden" id="loadingFinance"><div class="spinner"></div>재무·손익 모듈 로딩 중...</div>
      <iframe class="module-frame active" id="treasuryFrame" src="treasury.html" title="자금관리"
        allow="clipboard-write; clipboard-read; identity-credentials-get; storage-access"></iframe>
      <iframe class="module-frame" id="financeFrame" src="" title="재무·손익" loading="lazy"
        allow="clipboard-write; clipboard-read; identity-credentials-get; storage-access"></iframe>
    </div>
  </main>
</div>

<script>
let financeLoaded = false;

document.getElementById("treasuryFrame").addEventListener("load", () => {
  document.getElementById("loadingTreasury").classList.add("hidden");
}, { once: true });

function loadFinance() {
  if (financeLoaded) return;
  financeLoaded = true;
  const frame = document.getElementById("financeFrame");
  frame.src = "finance.html";
  frame.addEventListener("load", () => {
    document.getElementById("loadingFinance").classList.add("hidden");
  }, { once: true });
}

function switchModule(module) {
  document.querySelectorAll(".nav-item").forEach(n => {
    n.classList.toggle("active", n.dataset.module === module);
  });
  const treasuryFrame = document.getElementById("treasuryFrame");
  const financeFrame = document.getElementById("financeFrame");
  if (module === "treasury") {
    treasuryFrame.classList.add("active");
    financeFrame.classList.remove("active");
  } else {
    loadFinance();
    treasuryFrame.classList.remove("active");
    financeFrame.classList.add("active");
  }
}
</script>
</body>
</html>
