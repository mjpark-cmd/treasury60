          <Select value={directionFilter} onChange={setDirectionFilter} options={directionOptions} width={110} />

          <TextInput value={minAmount} onChange={setMinAmount} placeholder="최소금액 (예: 1000000)" width={150} />
          <TextInput value={search} onChange={setSearch} placeholder="모든 컬럼에서 검색" icon={Search} width={170} />
          <div className="ml-auto flex items-center gap-2">
            <ResetFiltersButton onClick={resetFilters} />
            <DownloadButton onClick={handleExport} />
          </div>
        </div>
        <RawTable headers={headers} rows={filtered.slice(0, 1000)} maxHeight={460} colSpan={headers.length} />
        {filtered.length > 1000 && (
          <div className="px-4 py-3 text-center text-xs" style={{ color: COLOR.textMute, borderTop: `1px solid ${COLOR.border}` }}>
            상위 1,000건만 표시 · 전체 {filtered.length}건
          </div>
        )}
      </Card>
    </div>
  );
}

// ============================================================================
//  CATEGORY ANALYSIS VIEW (분류 × 거래처 분석)
// ============================================================================
function CategoryAnalysisView({ metrics }) {
  const [direction, setDirection] = useState('in'); // 'in' | 'out'
  const [selectedCategory, setSelectedCategory] = useState('all');
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate] = useState('');
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('total'); // 기본: 합계 순
  const [sortDir, setSortDir] = useState('desc');
  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir(key === 'counterpart' ? 'asc' : 'desc'); }
  };

  // 자금이동 제외 + 기간 필터
  const relevantTxs = useMemo(() => {
    let list = metrics.filteredTransactions.filter(t => t.category !== '자금이동');
    if (startDate) list = list.filter(t => t.date >= startDate);
    if (endDate) list = list.filter(t => t.date <= endDate);
    // 방향에 따라 입금/출금 거래만
    if (direction === 'in') list = list.filter(t => t.inflow > 0);
    else if (direction === 'out') list = list.filter(t => t.outflow > 0);
    return list;
  }, [metrics.filteredTransactions, startDate, endDate, direction]);

  // 전체 법인 보기 여부 (법인 종류가 2개 이상이면 전체법인 모드)
  const isAllEntities = useMemo(() => {
    const entities = new Set(relevantTxs.map(t => t.entity).filter(Boolean));
    return entities.size > 1;
  }, [relevantTxs]);

  // 사용 가능한 분류 목록 (현재 direction 기준)
  const availableCategories = useMemo(() => {
    const cats = {};
    relevantTxs.forEach(t => {
      const cat = t.category || '(미분류)';
      if (!cats[cat]) cats[cat] = { name: cat, total: 0, count: 0 };
      cats[cat].total += (direction === 'in' ? t.inflow : t.outflow);
      cats[cat].count += 1;
    });
    return Object.values(cats).sort((a, b) => b.total - a.total);
  }, [relevantTxs, direction]);

  // 선택된 분류의 거래처별 집계
  const counterpartRows = useMemo(() => {
    const list = selectedCategory === 'all' ? relevantTxs : relevantTxs.filter(t => (t.category || '(미분류)') === selectedCategory);
    const agg = {};
    list.forEach(t => {
      const cp = t.counterpart || '(미지정)';
      if (!agg[cp]) agg[cp] = { counterpart: cp, total: 0, count: 0, lastDate: '', firstDate: '', categories: new Set(), entities: {} };
      const amt = (direction === 'in' ? t.inflow : t.outflow);
      agg[cp].total += amt;
      agg[cp].count += 1;
      if (t.date > agg[cp].lastDate) agg[cp].lastDate = t.date;
      if (!agg[cp].firstDate || t.date < agg[cp].firstDate) agg[cp].firstDate = t.date;
      agg[cp].categories.add(t.category || '(미분류)');
      // 법인별 금액 집계 (전체법인 선택 시 어느 법인인지 표시용)
      const ent = t.entity || '(미지정)';
      if (!agg[cp].entities[ent]) agg[cp].entities[ent] = { total: 0, count: 0 };
      agg[cp].entities[ent].total += amt;
      agg[cp].entities[ent].count += 1;
    });
    let rows = Object.values(agg).map(r => {
      // entities 객체를 "금액 많은 순 배열"로 변환
      const entityList = Object.entries(r.entities)
        .map(([name, v]) => ({ name, total: v.total, count: v.count }))
        .sort((a, b) => b.total - a.total);
      return { ...r, categoryList: [...r.categories], entityList };
    });
    if (search) {
      const s = search.toLowerCase();
      rows = rows.filter(r => r.counterpart.toLowerCase().includes(s));
    }
    // 정렬 적용
    rows.sort((a, b) => {
      let va, vb;
      switch (sortKey) {
        case 'counterpart': va = a.counterpart; vb = b.counterpart; break;
        case 'total': va = a.total; vb = b.total; break;
        case 'count': va = a.count; vb = b.count; break;
        case 'avg': va = a.total / a.count; vb = b.total / b.count; break;
        case 'lastDate': va = a.lastDate || ''; vb = b.lastDate || ''; break;
        default: va = a.total; vb = b.total;
      }
      let cmp;
      if (typeof va === 'number' && typeof vb === 'number') cmp = va - vb;
      else cmp = String(va).localeCompare(String(vb), 'ko');
      return sortDir === 'asc' ? cmp : -cmp;
    });
    return rows;
  }, [relevantTxs, selectedCategory, direction, search, sortKey, sortDir]);

  const grandTotal = counterpartRows.reduce((s, r) => s + r.total, 0);
  const grandCount = counterpartRows.reduce((s, r) => s + r.count, 0);

  const resetFilters = () => { setSelectedCategory('all'); setSearch(''); setStartDate(''); setEndDate(''); };

  const handleExport = () => {
    const label = direction === 'in' ? '입금' : '출금';
    const rows = counterpartRows.map(r => {
      const entityStr = r.entityList.map(e => `${e.name}(${e.total.toLocaleString()})`).join(' / ');
      return {
        '거래처': r.counterpart,
        '법인': entityStr,
        '분류': r.categoryList.join(', '),
        [`${label}합계`]: r.total,
        '건수': r.count,
        '최초거래일': r.firstDate,
        '마지막거래일': r.lastDate,
      };
    });
    const catPart = selectedCategory === 'all' ? '전체' : selectedCategory;
    exportCSV(`거래처분석_${label}_${catPart}_${new Date().toISOString().slice(0,10)}.csv`, rows,
      ['거래처', '법인', '분류', `${label}합계`, '건수', '최초거래일', '마지막거래일']);
  };

  const accentColor = direction === 'in' ? COLOR.success : COLOR.danger;
  const directionLabel = direction === 'in' ? '입금' : '출금';

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-2 px-1" style={{ color: COLOR.textMute }}>
        <div className="text-xs flex items-center gap-2">
          <AlertCircle size={12} />
          <span>실적 기준 · 자금이동 제외 · 분류 선택 시 거래처별로 집계</span>
        </div>
      </div>

      {/* 방향 토글 */}
      <div className="flex gap-2">
        <button onClick={() => { setDirection('in'); setSelectedCategory('all'); }}
                className="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"
                style={{
                  background: direction === 'in' ? COLOR.success : COLOR.surface,
                  color: direction === 'in' ? '#fff' : COLOR.textDim,
                  border: `1px solid ${direction === 'in' ? COLOR.success : COLOR.border}`,
                }}>
          <TrendingUp size={14} /> 입금 분석
        </button>
        <button onClick={() => { setDirection('out'); setSelectedCategory('all'); }}
                className="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"
                style={{
                  background: direction === 'out' ? COLOR.danger : COLOR.surface,
                  color: direction === 'out' ? '#fff' : COLOR.textDim,
                  border: `1px solid ${direction === 'out' ? COLOR.danger : COLOR.border}`,
                }}>
          <TrendingDown size={14} /> 출금 분석
        </button>
      </div>

      {/* 1단계: 분류 선택 */}
      <Card className="p-5">
        <div className="mb-3 flex items-center justify-between flex-wrap gap-2">
          <div>
            <div className="text-sm font-semibold" style={{ color: COLOR.text }}>① 분류 선택</div>
            <div className="text-xs mt-0.5" style={{ color: COLOR.textMute }}>
              {directionLabel} 분류 중 하나를 선택하면 해당 분류의 거래처별 집계가 아래에 표시됩니다
            </div>
          </div>
          <div className="flex items-center gap-2">
            <DateInput value={startDate} onChange={setStartDate} />
            <span style={{ color: COLOR.textMute }}>~</span>
            <DateInput value={endDate} onChange={setEndDate} />
          </div>
        </div>
        <div className="flex flex-wrap gap-2">
          <button onClick={() => setSelectedCategory('all')}
                  className="px-3 py-2 rounded-lg text-xs flex items-center gap-2"
                  style={{
                    background: selectedCategory === 'all' ? accentColor : COLOR.surface,
                    color: selectedCategory === 'all' ? '#fff' : COLOR.textDim,
                    border: `1px solid ${selectedCategory === 'all' ? accentColor : COLOR.border}`,
                  }}>
            <span>전체</span>
            <span style={{ fontFamily: 'var(--mono)', opacity: 0.8 }}>
              {formatCompactKRW(availableCategories.reduce((s, c) => s + c.total, 0))}
            </span>
          </button>
          {availableCategories.map(cat => (
            <button key={cat.name} onClick={() => setSelectedCategory(cat.name)}
                    className="px-3 py-2 rounded-lg text-xs flex items-center gap-2"
                    style={{
                      background: selectedCategory === cat.name ? accentColor : COLOR.surface,
                      color: selectedCategory === cat.name ? '#fff' : COLOR.textDim,
                      border: `1px solid ${selectedCategory === cat.name ? accentColor : COLOR.border}`,
                    }}>
              <span>{cat.name}</span>
              <span style={{ fontFamily: 'var(--mono)', opacity: 0.8 }}>{formatCompactKRW(cat.total)}</span>
              <span className="text-[10px] px-1.5 py-0.5 rounded" style={{
                background: selectedCategory === cat.name ? 'rgba(255,255,255,0.2)' : COLOR.surfaceEl,
                color: selectedCategory === cat.name ? '#fff' : COLOR.textMute,
              }}>{cat.count}건</span>
            </button>
          ))}
          {availableCategories.length === 0 && (
            <div className="text-xs py-4" style={{ color: COLOR.textMute }}>표시할 분류가 없습니다.</div>
          )}
        </div>
      </Card>

      {/* 2단계: 거래처별 상세 */}
      <Card className="overflow-hidden">
        <div className="px-5 py-4 flex items-center justify-between flex-wrap gap-3" style={{ borderBottom: `1px solid ${COLOR.border}` }}>
          <div>
            <div className="text-sm font-semibold flex items-center gap-2" style={{ color: COLOR.text }}>
              ② 거래처별 {directionLabel} 순위
              <span className="text-xs font-normal px-2 py-0.5 rounded" style={{ color: accentColor, background: `${accentColor}15` }}>
                {selectedCategory === 'all' ? '전체 분류' : selectedCategory}
              </span>
            </div>
            <div className="text-xs mt-0.5" style={{ color: COLOR.textMute }}>
              거래처 {counterpartRows.length}개 · 합계 {formatCompactKRW(grandTotal)} · {grandCount}건
            </div>
          </div>
          <div className="flex items-center gap-2">
            <TextInput value={search} onChange={setSearch} placeholder="거래처 검색" icon={Search} width={180} />
            <ResetFiltersButton onClick={resetFilters} />
            <DownloadButton onClick={handleExport} />
          </div>
        </div>
        <div className="overflow-x-auto" style={{ maxHeight: 600, overflowY: 'auto' }}>
          <table className="w-full text-sm">
            <thead style={{ position: 'sticky', top: 0, zIndex: 1, background: COLOR.surfaceEl }}>
              <tr>
                <th className="px-3 py-3 text-left text-xs font-medium whitespace-nowrap" style={{ color: COLOR.textMute, width: 48 }}>순위</th>
                <th onClick={() => toggleSort('counterpart')}
                    className="px-3 py-3 text-left text-xs font-medium whitespace-nowrap select-none"
                    style={{ color: sortKey === 'counterpart' ? COLOR.text : COLOR.textMute, cursor: 'pointer', userSelect: 'none' }}>
                  거래처{sortKey === 'counterpart' ? <span style={{ color: COLOR.gold, marginLeft: 4 }}>{sortDir === 'asc' ? '▲' : '▼'}</span> : <span style={{ color: COLOR.textMute, fontSize: 9, marginLeft: 4, opacity: 0.5 }}>⇅</span>}
                </th>
                {isAllEntities && (
                  <th className="px-3 py-3 text-left text-xs font-medium whitespace-nowrap" style={{ color: COLOR.textMute }}>
                    법인
                  </th>
                )}
                <th onClick={() => toggleSort('total')}
                    className="px-3 py-3 text-right text-xs font-medium whitespace-nowrap select-none"
                    style={{ color: sortKey === 'total' ? COLOR.text : COLOR.textMute, cursor: 'pointer', userSelect: 'none' }}>
                  {directionLabel} 합계{sortKey === 'total' ? <span style={{ color: COLOR.gold, marginLeft: 4 }}>{sortDir === 'asc' ? '▲' : '▼'}</span> : <span style={{ color: COLOR.textMute, fontSize: 9, marginLeft: 4, opacity: 0.5 }}>⇅</span>}
                </th>
                <th className="px-3 py-3 text-right text-xs font-medium whitespace-nowrap" style={{ color: COLOR.textMute }}>비중</th>
                <th onClick={() => toggleSort('count')}
                    className="px-3 py-3 text-right text-xs font-medium whitespace-nowrap select-none"
                    style={{ color: sortKey === 'count' ? COLOR.text : COLOR.textMute, cursor: 'pointer', userSelect: 'none' }}>
                  건수{sortKey === 'count' ? <span style={{ color: COLOR.gold, marginLeft: 4 }}>{sortDir === 'asc' ? '▲' : '▼'}</span> : <span style={{ color: COLOR.textMute, fontSize: 9, marginLeft: 4, opacity: 0.5 }}>⇅</span>}
                </th>
                <th onClick={() => toggleSort('avg')}
                    className="px-3 py-3 text-right text-xs font-medium whitespace-nowrap select-none"
                    style={{ color: sortKey === 'avg' ? COLOR.text : COLOR.textMute, cursor: 'pointer', userSelect: 'none' }}>
                  평균{sortKey === 'avg' ? <span style={{ color: COLOR.gold, marginLeft: 4 }}>{sortDir === 'asc' ? '▲' : '▼'}</span> : <span style={{ color: COLOR.textMute, fontSize: 9, marginLeft: 4, opacity: 0.5 }}>⇅</span>}
                </th>
                {selectedCategory === 'all' && <th className="px-3 py-3 text-left text-xs font-medium whitespace-nowrap" style={{ color: COLOR.textMute }}>주요 분류</th>}
                <th onClick={() => toggleSort('lastDate')}
                    className="px-3 py-3 text-left text-xs font-medium whitespace-nowrap select-none"
                    style={{ color: sortKey === 'lastDate' ? COLOR.text : COLOR.textMute, cursor: 'pointer', userSelect: 'none' }}>
                  최근 거래{sortKey === 'lastDate' ? <span style={{ color: COLOR.gold, marginLeft: 4 }}>{sortDir === 'asc' ? '▲' : '▼'}</span> : <span style={{ color: COLOR.textMute, fontSize: 9, marginLeft: 4, opacity: 0.5 }}>⇅</span>}
                </th>
              </tr>
            </thead>
            <tbody>
              {counterpartRows.map((r, i) => {
                const pct = grandTotal > 0 ? (r.total / grandTotal) * 100 : 0;
                return (
                  <tr key={i} style={{ borderTop: `1px solid ${COLOR.border}` }}>
                    <td className="px-3 py-2.5 tabular-nums" style={{ color: COLOR.textDim, fontFamily: 'var(--mono)', fontSize: 11 }}>{i + 1}</td>
                    <td className="px-3 py-2.5 font-medium" style={{ color: COLOR.text }}>{r.counterpart}</td>
                    {isAllEntities && (
                      <td className="px-3 py-2.5" style={{ color: COLOR.textDim, fontSize: 11, maxWidth: 220 }}>
                        {r.entityList.length === 1 ? (
                          <span style={{ color: COLOR.text }}>{r.entityList[0].name}</span>
                        ) : (
                          <span title={r.entityList.map(e => `${e.name}: ${formatCompactKRW(e.total)} (${e.count}건)`).join(' / ')}>
                            {r.entityList.slice(0, 2).map(e => (
                              <span key={e.name} className="inline-block mr-1.5 mb-0.5 text-[10px] px-1.5 py-0.5 rounded"
                                    style={{ background: COLOR.surfaceEl, color: COLOR.textDim, border: `1px solid ${COLOR.border}` }}>
                                {e.name} <b style={{ color: accentColor, fontFamily: 'var(--mono)' }}>{formatCompactKRW(e.total)}</b>
                              </span>
                            ))}
                            {r.entityList.length > 2 && (
                              <span className="text-[10px]" style={{ color: COLOR.textMute }}>
                                외 {r.entityList.length - 2}개
                              </span>
                            )}
                          </span>
                        )}
                      </td>
                    )}
                    <td className="px-3 py-2.5 text-right tabular-nums font-semibold whitespace-nowrap" style={{ fontFamily: 'var(--mono)', color: accentColor }}>
                      {formatKRW(r.total)}
                    </td>
                    <td className="px-3 py-2.5 text-right whitespace-nowrap">
                      <div className="flex items-center gap-2 justify-end">
                        <div style={{ width: 60, height: 4, borderRadius: 2, background: COLOR.surfaceEl, overflow: 'hidden' }}>
                          <div style={{ width: `${Math.min(100, pct)}%`, height: '100%', background: accentColor }} />
                        </div>
                        <span className="tabular-nums" style={{ fontFamily: 'var(--mono)', fontSize: 11, color: COLOR.textDim, minWidth: 36 }}>
                          {pct.toFixed(1)}%
                        </span>
                      </div>
                    </td>
                    <td className="px-3 py-2.5 text-right tabular-nums" style={{ fontFamily: 'var(--mono)', color: COLOR.textDim, fontSize: 12 }}>
                      {r.count}
                    </td>
                    <td className="px-3 py-2.5 text-right tabular-nums" style={{ fontFamily: 'var(--mono)', color: COLOR.textDim, fontSize: 12 }}>
                      {formatCompactKRW(r.total / r.count)}
                    </td>
                    {selectedCategory === 'all' && (
                      <td className="px-3 py-2.5" style={{ color: COLOR.textDim, fontSize: 11 }}>
                        {r.categoryList.slice(0, 3).join(', ')}{r.categoryList.length > 3 ? ` 외 ${r.categoryList.length - 3}` : ''}
                      </td>
                    )}
                    <td className="px-3 py-2.5 whitespace-nowrap" style={{ color: COLOR.textDim, fontFamily: 'var(--mono)', fontSize: 11 }}>
                      {r.lastDate || '—'}
                    </td>
                  </tr>
                );
              })}
              {counterpartRows.length === 0 && (
                <tr><td colSpan={(selectedCategory === 'all' ? 8 : 7) + (isAllEntities ? 1 : 0)} className="px-4 py-8 text-center" style={{ color: COLOR.textMute }}>
                  조건에 맞는 거래처가 없습니다.
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

// ============================================================================
//  LOANS VIEW (차입금 현황)
// ============================================================================
function LoansView({ loans, entityFilter }) {
  const [search, setSearch] = useState('');
  const [entityColFilter, setEntityColFilter] = useState('all');

  const headers = loans?.headers || [];
  const rows = loans?.rows || [];

  // 선택된 법인(entityFilter, 대시보드 상단 드롭다운) 기준 1차 필터
  const scopedRows = useMemo(() => {
    if (!rows || rows.length === 0) return [];
    if (entityFilter === 'all') return rows;
    return rows.filter(r => r._entity === entityFilter);
  }, [rows, entityFilter]);

  // 내부 entity 드롭다운용 (전체 선택 시 추가 분류)
  const entityOptions = useMemo(() => {
    const set = new Set(scopedRows.map(r => r._entity).filter(Boolean));
    return [{ value: 'all', label: '전체 법인' }, ...[...set].sort().map(e => ({ value: e, label: e }))];
  }, [scopedRows]);

  const filtered = useMemo(() => {
    let list = scopedRows;
    if (entityColFilter !== 'all') list = list.filter(r => r._entity === entityColFilter);
    if (search) {
      const s = search.toLowerCase();
      list = list.filter(r => Object.values(r).some(v => String(v || '').toLowerCase().includes(s)));
    }
    return list;
  }, [scopedRows, entityColFilter, search]);

  const resetFilters = () => { setSearch(''); setEntityColFilter('all'); };

  const handleExport = () => {
    const rowsForExport = filtered.map(r => {
      const obj = {};
      headers.forEach(h => { obj[h || '열'] = r[h] || ''; });
      return obj;
    });
    exportCSV(`차입금현황_${new Date().toISOString().slice(0, 10)}.csv`, rowsForExport, headers);
  };

  // 숫자처럼 보이는 컬럼은 우측 정렬
  const isNumericCol = (header) => /금액|한도|잔액|이율|이자|금리|수수료|%|rate|amount/i.test(header || '');

  if (rows.length === 0) {
    return (
      <Card className="p-8">
        <div className="text-center" style={{ color: COLOR.textMute }}>
          <div className="text-sm font-medium mb-2" style={{ color: COLOR.textDim }}>차입금 데이터가 없습니다</div>
          <div className="text-xs leading-relaxed">
            Google Sheets에 <b style={{ color: COLOR.gold }}>차입금현황</b> 탭을 만들고,<br />
            <b>B8:R</b> 범위에 헤더와 데이터를 입력한 뒤 <b>데이터 동기화</b>를 실행하세요.<br />
            <span className="text-[11px]" style={{ color: COLOR.textMute }}>
              · B열은 법인명이어야 합니다 (대시보드 법인 목록과 일치하는 행만 가져옵니다)<br />
              · H, I, L 열은 자동 제외됩니다
            </span>
          </div>
        </div>
      </Card>
    );
  }

  return (
    <div className="space-y-4">
      {/* KPI 요약 */}
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
        <KPICard label="전체 차입금 건수" value={`${rows.length}건`}
                 subValue={entityFilter === 'all' ? '전체 법인' : entityFilter}
                 icon={CreditCard} accent={COLOR.info} />
        <KPICard label="현재 필터 결과" value={`${filtered.length}건`}
                 subValue={entityColFilter === 'all' ? '필터 없음' : entityColFilter}
                 icon={FilterIcon} accent={COLOR.gold} />
        <KPICard label="법인 수" value={`${new Set(scopedRows.map(r => r._entity)).size}개`}
                 subValue="차입금 보유 법인"
                 icon={Building2} accent={COLOR.purple} />
      </div>

      <Card className="overflow-hidden">
        <div className="px-5 py-4" style={{ borderBottom: `1px solid ${COLOR.border}` }}>
          <div className="text-sm font-semibold flex items-center gap-2" style={{ color: COLOR.text }}>
            <CreditCard size={14} style={{ color: COLOR.gold }} />
            차입금 현황
          </div>
          <div className="text-xs mt-0.5" style={{ color: COLOR.textMute }}>
            Google Sheets '차입금현황' 탭 · B8:R · H/I/L 열 제외 · 법인명 일치 행만 ({filtered.length}건)
          </div>
        </div>
        <div className="px-5 py-3 flex items-center gap-2 flex-wrap" style={{ background: COLOR.bg, borderBottom: `1px solid ${COLOR.border}` }}>
          <FilterIcon size={12} style={{ color: COLOR.textMute }} />
          {entityFilter === 'all' && (
            <Select value={entityColFilter} onChange={setEntityColFilter} options={entityOptions} width={160} />
          )}
          <TextInput value={search} onChange={setSearch} placeholder="모든 컬럼에서 검색" icon={Search} width={200} />
          <div className="ml-auto flex items-center gap-2">
            <ResetFiltersButton onClick={resetFilters} />
            <DownloadButton onClick={handleExport} />
          </div>
        </div>

        <div className="overflow-x-auto" style={{ maxHeight: 640, overflowY: 'auto' }}>
          <table className="w-full text-sm">
            <thead style={{ position: 'sticky', top: 0, zIndex: 10, background: COLOR.surfaceEl }}>
              <tr>
                {headers.map((h, i) => (
                  <th key={i} className="px-3 py-3 text-left text-xs font-medium whitespace-nowrap"
                      style={{ color: COLOR.textMute, letterSpacing: '0.04em',
                               textAlign: isNumericCol(h) ? 'right' : 'left' }}>
                    {h || `열${i + 1}`}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.slice(0, 1000).map((r, idx) => (
                <tr key={idx} style={{ borderTop: `1px solid ${COLOR.border}` }}>
                  {headers.map((h, i) => {
                    const val = r[h] != null ? String(r[h]) : '';
                    const numeric = isNumericCol(h);
                    return (
                      <td key={i}
                          className={`px-3 py-2.5 whitespace-nowrap ${numeric ? 'text-right tabular-nums' : ''}`}
                          style={{ color: COLOR.text, fontFamily: numeric ? 'var(--mono)' : 'inherit',
                                   fontSize: numeric ? '12px' : '13px' }}>
                        {val || <span style={{ color: COLOR.textMute }}>—</span>}
                      </td>
                    );
                  })}
                </tr>
              ))}
              {filtered.length === 0 && (
                <tr><td colSpan={headers.length} className="px-4 py-8 text-center" style={{ color: COLOR.textMute }}>
                  필터 조건에 해당하는 차입금이 없습니다.
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
        {filtered.length > 1000 && (
          <div className="px-4 py-3 text-center text-xs" style={{ color: COLOR.textMute, borderTop: `1px solid ${COLOR.border}` }}>
            상위 1,000건만 표시 · 전체 {filtered.length}건
          </div>
        )}
      </Card>
    </div>
  );
}

// ============================================================================
//  IMPORT VIEW
// ============================================================================
function ImportView({ data, setData, onReset, driveSettings, setDriveSettings, accessToken, setAccessToken, tokenClient, setTokenClient, teamSettings, setTeamSettings, setLoans }) {
  const [mode, setMode] = useState('file'); // 'file' | 'drive'
  const [importStatus, setImportStatus] = useState({});
  const fileRefs = { accounts: useRef(null), transactions: useRef(null), plans: useRef(null) };
  const [dragActive, setDragActive] = useState({});

  // Drive 폼 상태 (설정 저장 전까지 임시)
  const [formClientId, setFormClientId] = useState(driveSettings.clientId);
  const [formUrl, setFormUrl] = useState(driveSettings.spreadsheetUrl);
  const [formTabs, setFormTabs] = useState(driveSettings.tabs);
  const [syncStatus, setSyncStatus] = useState(null); // 'loading' | 'success' | 'error'
  const [syncMsg, setSyncMsg] = useState('');
  const [lastSync, setLastSync] = useState(() => { try { return localStorage.getItem('finance:v2:lastSync') || ''; } catch { return ''; } });

  // driveSettings 바뀌면 폼 동기화
  useEffect(() => {
    setFormClientId(driveSettings.clientId);
    setFormUrl(driveSettings.spreadsheetUrl);
    setFormTabs(driveSettings.tabs);
  }, [driveSettings]);

  // Google Identity Services 초기화
  useEffect(() => {
    if (!driveSettings.clientId || !window.google?.accounts?.oauth2) return;
    try {
      const client = window.google.accounts.oauth2.initTokenClient({
        client_id: driveSettings.clientId,
        scope: OAUTH_SCOPE,
        callback: '',
      });
      setTokenClient(client);
    } catch (e) {
      setSyncStatus('error');
      setSyncMsg(`인증 초기화 실패: ${e.message}`);
    }
  }, [driveSettings.clientId]);

  const handleFile = async (file, slot) => {
    if (!file) return;
    try {
      const text = await file.text();
      const { headers, rows } = parseCSV(text);
      if (rows.length === 0) {
        setImportStatus(s => ({ ...s, [slot]: { ok: false, msg: '데이터가 없습니다.' } }));
        return;
      }
      let next = { ...data };
      let parsed, warnings = [];

      if (slot === 'accounts') {
        parsed = parseAccountsFile(headers, rows);
        if (parsed.length === 0) warnings.push('법인명/은행NO가 인식되지 않았습니다. 헤더를 확인하세요.');
        next.accounts = parsed;
      } else if (slot === 'transactions') {
        parsed = parseActualsFile(headers, rows);
        next.transactions = parsed;
        if (next.accounts.length > 0) {
          const accNums = new Set(next.accounts.map(a => a.number));
          const unmatched = parsed.filter(t => t.accountNumber && !accNums.has(t.accountNumber));
          if (unmatched.length > 0) {
            const uniq = [...new Set(unmatched.map(t => t.accountNumber))].slice(0, 3);
            warnings.push(`⚠ ${unmatched.length}건은 계좌 마스터에 없는 계좌 (예: "${uniq.join('", "')}")`);
          }
        }
      } else if (slot === 'plans') {
        parsed = parsePlansFile(headers, rows);
        next.plans = parsed;
      }

      setData(next);
      setImportStatus(s => ({ ...s, [slot]: {
        ok: true,
        warning: warnings.length > 0,
        msg: `${file.name} · ${parsed.length}건 가져오기 성공 (전체 ${rows.length}행)${warnings.length ? ' · ' + warnings.join(' · ') : ''}`,
      }}));
    } catch (e) {
      setImportStatus(s => ({ ...s, [slot]: { ok: false, msg: `오류: ${e.message}` } }));
    }
  };

  const makeDropHandlers = (slot) => ({
    onDragEnter: (e) => { e.preventDefault(); e.stopPropagation(); setDragActive(d => ({ ...d, [slot]: true })); },
    onDragLeave: (e) => { e.preventDefault(); e.stopPropagation(); setDragActive(d => ({ ...d, [slot]: false })); },
    onDragOver: (e) => { e.preventDefault(); e.stopPropagation(); },
    onDrop: (e) => {
      e.preventDefault(); e.stopPropagation();
      setDragActive(d => ({ ...d, [slot]: false }));
      const file = e.dataTransfer.files?.[0];
      if (file) handleFile(file, slot);
    },
  });

  // === Drive 연동 핸들러 ===
  const saveDriveSettings = () => {
    const next = {
      clientId: formClientId.trim(),
      spreadsheetUrl: formUrl.trim(),
      tabs: formTabs,
    };
    setDriveSettings(next);
    setAccessToken(null); // Client ID 변경 시 토큰 재요청 필요
    setSyncStatus('success');
    setSyncMsg('설정이 저장되었습니다.');
    setTimeout(() => { setSyncStatus(null); setSyncMsg(''); }, 2000);
  };

  const connectDrive = () => {
    if (!driveSettings.clientId) {
      setSyncStatus('error');
      setSyncMsg('Client ID를 먼저 저장하세요.');
      return;
    }
    if (!tokenClient) {
      setSyncStatus('error');
      setSyncMsg('Google 인증 라이브러리 로드 중입니다. 잠시 후 다시 시도하세요.');
      return;
    }
    tokenClient.callback = (response) => {
      if (response.error) {
        setSyncStatus('error');
        setSyncMsg(`인증 거부됨: ${response.error}${response.error_description ? ' - ' + response.error_description : ''}`);
        return;
      }
      setAccessToken(response.access_token);
      setSyncStatus('success');
      setSyncMsg('Drive에 연결되었습니다. 자동 동기화 중...');
      // 자동 동기화: 연결 직후 바로 실행 (토큰 state 반영 대기 후)
      setTimeout(() => syncFromDriveWithToken(response.access_token), 200);
    };
    tokenClient.requestAccessToken({ prompt: '' });
  };

  // 명시적 토큰으로 동기화 실행 (자동 동기화용 - accessToken state 업데이트 대기 필요 없음)
  const syncFromDriveWithToken = async (token) => {
    if (!token) return;
    const ssid = extractSpreadsheetId(driveSettings.spreadsheetUrl);
    if (!ssid) {
      setSyncStatus('error');
      setSyncMsg('유효한 스프레드시트 URL이 아닙니다.');
      return;
    }
    setSyncStatus('loading');
    setSyncMsg('동기화 중...');
    try {
      const [accArr, txArr, planArr, settingsArr, loansArr] = await Promise.all([
        fetchSheetArray(ssid, driveSettings.tabs.accounts, token),
        fetchSheetArray(ssid, driveSettings.tabs.transactions, token),
        fetchSheetArray(ssid, driveSettings.tabs.plans, token),
        fetchSheetArray(ssid, driveSettings.tabs.settings || '설정', token).catch(() => []),
        fetchSheetRange(ssid, driveSettings.tabs.loans || '차입금현황', 'B8:R10000', token).catch(() => []),
      ]);
      const accHR = sheetArrayToRowsWithHeaders(accArr);
      const txHR = sheetArrayToRowsWithHeaders(txArr);
      const planHR = sheetArrayToRowsWithHeaders(planArr);
      const accounts = parseAccountsFile(accHR.headers, accHR.rows);
      const transactions = parseActualsFile(txHR.headers, txHR.rows);
      const plans = parsePlansFile(planHR.headers, planHR.rows);
      const parsedSettings = parseTeamSettings(settingsArr);
      const entitiesFromAccounts = [...new Set(accounts.map(a => a.entity))].filter(Boolean);
      const parsedLoans = parseLoans(loansArr, entitiesFromAccounts);
      setData({ accounts, transactions, plans });
      try { localStorage.setItem('finance:v2:teamSettings', JSON.stringify(parsedSettings)); } catch {}
      if (setTeamSettings) setTeamSettings(parsedSettings);
      try { localStorage.setItem('finance:v2:loans', JSON.stringify(parsedLoans)); } catch {}
      if (setLoans) setLoans(parsedLoans);
      const now = new Date().toISOString();
      try { localStorage.setItem('finance:v2:lastSync', now); } catch {}
      setLastSync(now);
      setSyncStatus('success');
      setSyncMsg(`자동 동기화 완료 · 계좌 ${accounts.length} / 거래 ${transactions.length} / 계획 ${plans.length} / 차입금 ${parsedLoans.rows.length}`);
    } catch (e) {
      setSyncStatus('error');
      setSyncMsg(`자동 동기화 실패: ${e.message}`);
    }
  };

  const syncFromDrive = async () => {
    if (!accessToken) {
      setSyncStatus('error');
      setSyncMsg('먼저 Drive에 연결하세요.');
      return;
    }
    const ssid = extractSpreadsheetId(driveSettings.spreadsheetUrl);
    if (!ssid) {
      setSyncStatus('error');
      setSyncMsg('유효한 스프레드시트 URL이 아닙니다.');
      return;
    }
    setSyncStatus('loading');
    setSyncMsg('동기화 중...');
    try {
      const [accArr, txArr, planArr, settingsArr, loansArr] = await Promise.all([
        fetchSheetArray(ssid, driveSettings.tabs.accounts, accessToken),
        fetchSheetArray(ssid, driveSettings.tabs.transactions, accessToken),
        fetchSheetArray(ssid, driveSettings.tabs.plans, accessToken),
        // 설정 탭은 선택사항 - 없어도 에러 안 남
        fetchSheetArray(ssid, driveSettings.tabs.settings || '설정', accessToken).catch(() => []),
        // 차입금 시트도 선택사항 - B8:R부터만 가져옴
        fetchSheetRange(ssid, driveSettings.tabs.loans || '차입금현황', 'B8:R10000', accessToken).catch(() => []),
      ]);
      // ⭐ CSV 텍스트로 변환 후 파일 업로드와 완전히 동일한 파서 사용
      // 이렇게 하면 Sheets 동기화 = CSV 업로드 결과가 100% 일치
      const accHR = sheetArrayToRowsWithHeaders(accArr);
      const txHR = sheetArrayToRowsWithHeaders(txArr);
      const planHR = sheetArrayToRowsWithHeaders(planArr);

      const accounts = parseAccountsFile(accHR.headers, accHR.rows);
      const transactions = parseActualsFile(txHR.headers, txHR.rows);
      const plans = parsePlansFile(planHR.headers, planHR.rows);

      // 설정 탭 파싱: 2열(키/값) 테이블
      const parsedSettings = parseTeamSettings(settingsArr);

      // 차입금 파싱 (대시보드 법인 목록만 필터)
      const entitiesFromAccounts = [...new Set(accounts.map(a => a.entity))].filter(Boolean);
      const parsedLoans = parseLoans(loansArr, entitiesFromAccounts);

      // 계좌 매칭 확인
      let unmatchedMsg = '';
      if (accounts.length > 0 && transactions.length > 0) {
        const accNums = new Set(accounts.map(a => a.number));
        const unmatched = transactions.filter(t => t.accountNumber && !accNums.has(t.accountNumber));
        if (unmatched.length > 0) {
          const uniq = [...new Set(unmatched.map(t => t.accountNumber))].slice(0, 3);
          unmatchedMsg = ` · ⚠ 거래 ${unmatched.length}건 계좌 매칭 실패 (예: "${uniq.join('", "')}")`;
        }
      }

      setData({ accounts, transactions, plans });
      // 팀 설정 저장 (마감월 등)
      try { localStorage.setItem('finance:v2:teamSettings', JSON.stringify(parsedSettings)); } catch {}
      if (setTeamSettings) setTeamSettings(parsedSettings);
      // 차입금 저장
      try { localStorage.setItem('finance:v2:loans', JSON.stringify(parsedLoans)); } catch {}
      if (setLoans) setLoans(parsedLoans);
      const now = new Date().toISOString();
      try { localStorage.setItem('finance:v2:lastSync', now); } catch {}
      setLastSync(now);
      setSyncStatus('success');
      setSyncMsg(`동기화 완료 · 계좌 ${accounts.length} / 거래 ${transactions.length} / 계획 ${plans.length} / 차입금 ${parsedLoans.rows.length}${unmatchedMsg}`);
    } catch (e) {
      setSyncStatus('error');
      if (String(e.message).includes('401') || String(e.message).toLowerCase().includes('unauthorized')) {
        setSyncMsg('토큰이 만료되었습니다. 다시 연결해주세요.');
        setAccessToken(null);
      } else {
        setSyncMsg(`오류: ${e.message}`);
      }
    }
  };

  const slots = [
    {
      key: 'accounts', title: '계좌 마스터 (Master_Accounts.csv)',
      desc: '헤더: 법인명 · 계좌구분 · 자금구분 · 은행NO · 기초금액 · 순수자금_런웨이(Y/N) · 가용자금_런웨이(Y/N) · 재무제표_런웨이(Y/N)',
      count: data.accounts.length, label: '계좌',
    },
    {
      key: 'transactions', title: '입출금 실적 (Master_Actuals.csv)',
      desc: '헤더: 법인명 · 거래일 · 거래처명 · 내용 · 분류 · 계정과목 · 입금 · 출금 · 거래통장(은행NO)',
      count: data.transactions.length, label: '거래',
    },
    {
      key: 'plans', title: '자금 계획 (Master_Plans.csv)',
      desc: '헤더: 법인명 · 계획구분 · 주체구분 · 해당월 · 거래처명 · 계정과목 · 내용 · 입금액 · 출금액',
      count: data.plans.length, label: '계획',
    },
  ];

  const statusColor = syncStatus === 'error' ? COLOR.danger : syncStatus === 'success' ? COLOR.success : COLOR.gold;
  const isConnected = !!accessToken;
  const originUrl = typeof window !== 'undefined' ? window.location.origin : '';

  return (
    <div className="space-y-4">
      {/* 모드 토글 */}
      <div className="flex gap-2">
        <button onClick={() => setMode('file')}
                className="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"
                style={{
                  background: mode === 'file' ? COLOR.gold : COLOR.surfaceEl,
                  color: mode === 'file' ? '#fff' : COLOR.textDim,
                  border: `1px solid ${mode === 'file' ? COLOR.gold : COLOR.border}`,
                }}>
          <Upload size={14} /> 파일 업로드
        </button>
        <button onClick={() => setMode('drive')}
                className="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"
                style={{
                  background: mode === 'drive' ? COLOR.gold : COLOR.surfaceEl,
                  color: mode === 'drive' ? '#fff' : COLOR.textDim,
                  border: `1px solid ${mode === 'drive' ? COLOR.gold : COLOR.border}`,
                }}>
          <Cloud size={14} /> Google Drive 연동
        </button>
      </div>

      {/* 파일 업로드 모드 */}
      {mode === 'file' && (
        <>
          <Card className="p-5">
            <div className="flex items-center gap-2 mb-2">
              <Upload size={16} style={{ color: COLOR.gold }} />
              <div className="text-sm font-semibold" style={{ color: COLOR.text }}>CSV 파일 업로드</div>
            </div>
            <div className="text-xs" style={{ color: COLOR.textDim, lineHeight: 1.7 }}>
              세 개의 마스터 파일(<b style={{ color: COLOR.gold }}>Master_Accounts.csv</b>, <b style={{ color: COLOR.gold }}>Master_Actuals.csv</b>, <b style={{ color: COLOR.gold }}>Master_Plans.csv</b>)을 각각 해당 영역에 드래그하거나 클릭해서 업로드하세요.<br/>
              계좌 마스터를 먼저 올린 뒤 실적을 올려야 계좌 매칭이 됩니다. <b style={{ color: COLOR.gold }}>모든 원본 컬럼이 그대로 보존</b>되며, 런웨이 Y/N 플래그에 따라 순수자금·가용자금이 계산됩니다.
            </div>
          </Card>

          {slots.map(slot => {
            const st = importStatus[slot.key];
            const isActive = dragActive[slot.key];
            return (
              <Card key={slot.key} className="overflow-hidden">
                <div className="px-5 py-4 flex items-center justify-between flex-wrap gap-3" style={{ borderBottom: `1px solid ${COLOR.border}` }}>
                  <div>
                    <div className="text-sm font-semibold" style={{ color: COLOR.text }}>{slot.title}</div>
                    <div className="text-xs mt-0.5" style={{ color: COLOR.textMute }}>{slot.desc}</div>
                  </div>
                  <span className="text-xs px-2 py-1 rounded-md" style={{ background: COLOR.surfaceEl, color: COLOR.gold, fontFamily: 'var(--mono)' }}>
                    저장된 {slot.label} {slot.count}건
                  </span>
                </div>
                <div className="p-5">
                  <div {...makeDropHandlers(slot.key)} onClick={() => fileRefs[slot.key].current?.click()}
                       className={`rounded-xl p-6 text-center cursor-pointer transition-all ${isActive ? 'drop-zone-active' : ''}`}
                       style={{ background: COLOR.bg, border: `2px dashed ${isActive ? COLOR.gold : COLOR.border}` }}>
                    <div className="flex flex-col items-center gap-2">
                      <div className="w-12 h-12 rounded-xl flex items-center justify-center" style={{ background: `${COLOR.gold}18`, color: COLOR.gold }}>
                        <Upload size={20} />
                      </div>
                      <div className="text-sm font-medium" style={{ color: COLOR.text }}>
                        {isActive ? '여기에 놓으세요' : 'CSV 파일을 드래그하거나 클릭하여 업로드'}
                      </div>
                    </div>
                    <input ref={fileRefs[slot.key]} type="file" accept=".csv,.txt" style={{ display: 'none' }}
                           onChange={e => handleFile(e.target.files?.[0], slot.key)} />
                  </div>
                  {st && (() => {
                    const stColor = !st.ok ? COLOR.danger : (st.warning ? COLOR.gold : COLOR.success);
                    const StIcon = !st.ok ? XCircle : (st.warning ? AlertCircle : CheckCircle2);
                    return (
                      <div className="mt-3 text-xs px-3 py-2 rounded-lg flex items-start gap-2"
                           style={{ color: stColor, background: `${stColor}14`, border: `1px solid ${stColor}40` }}>
                        <StIcon size={13} style={{ marginTop: 1, flexShrink: 0 }} />
                        <span>{st.msg}</span>
                      </div>
                    );
                  })()}
                </div>
              </Card>
            );
          })}
        </>
      )}

      {/* Google Drive 연동 모드 */}
      {mode === 'drive' && (
        <>
          <Card className="p-5">
            <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: `${COLOR.gold}18`, color: COLOR.gold }}>
                  <Cloud size={20} />
                </div>
                <div>
                  <div className="text-sm font-semibold" style={{ color: COLOR.text }}>Google Drive 연동</div>
                  <div className="text-xs mt-0.5 flex items-center gap-2 flex-wrap" style={{ color: COLOR.textMute }}>
                    <span className="inline-block w-1.5 h-1.5 rounded-full" style={{ background: isConnected ? COLOR.success : COLOR.danger }} />
                    {isConnected ? '연결됨' : '연결 안됨'}
                    {lastSync && <span>· 마지막 동기화 {new Date(lastSync).toLocaleString('ko-KR')}</span>}
                  </div>
                </div>
              </div>
              <div className="flex gap-2 flex-wrap">
                <button onClick={connectDrive}
                        disabled={!driveSettings.clientId}
                        className="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"
                        style={{
                          background: isConnected ? COLOR.surfaceEl : COLOR.gold,
                          color: isConnected ? COLOR.text : '#fff',
                          border: `1px solid ${isConnected ? COLOR.border : COLOR.gold}`,
                        }}>
                  <Link2 size={14} /> {isConnected ? '재연결' : 'Drive 연결'}
                </button>
                <button onClick={syncFromDrive}
                        disabled={!isConnected || syncStatus === 'loading'}
                        className="px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2"
                        style={{ background: COLOR.gold, color: '#fff' }}>
                  {syncStatus === 'loading' ? <Spinner /> : <RefreshCw size={14} />}
                  데이터 동기화
                </button>
              </div>
            </div>
            {syncMsg && (
              <div className="text-xs px-3 py-2 rounded-lg flex items-center gap-2 mb-3"
                   style={{ color: statusColor, background: `${statusColor}14`, border: `1px solid ${statusColor}40` }}>
                {syncStatus === 'success' && <CheckCircle2 size={13} />}
                {syncStatus === 'error' && <XCircle size={13} />}
                {syncStatus === 'loading' && <Spinner size={13} />}
                {syncMsg}
              </div>
            )}
            <div className="text-xs px-3 py-2 rounded-lg flex items-start gap-2"
                 style={{ color: COLOR.info, background: `${COLOR.info}14`, border: `1px solid ${COLOR.info}40` }}>
              <AlertCircle size={13} style={{ marginTop: 2 }} />
              <div>
                Drive 연동은 한 번의 <b>Google Cloud 설정</b>이 필요합니다 (OAuth Client ID 발급). 설정 후 시트의 탭 이름을 지정하면 파일 업로드와 동일한 파서로 데이터를 가져옵니다.
              </div>
            </div>
          </Card>

          <Card className="p-5">
            <div className="flex items-center gap-2 mb-4">
              <Settings size={16} style={{ color: COLOR.gold }} />
              <div className="text-sm font-semibold" style={{ color: COLOR.text }}>연동 설정</div>
            </div>
            <div className="space-y-4">
              <div>
                <div className="flex items-center justify-between mb-2">
                  <label className="text-xs font-medium" style={{ color: COLOR.textDim }}>Google OAuth Client ID</label>
                  <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener"
                     className="text-xs flex items-center gap-1" style={{ color: COLOR.gold }}>
                    Google Cloud Console <ExternalLink size={10} />
                  </a>
                </div>
                <input type="text" value={formClientId} onChange={e => setFormClientId(e.target.value)}
                       placeholder="xxxxxxxxxxx-xxxxxxxxxxxxxxxxxxx.apps.googleusercontent.com"
                       className="w-full px-3 py-2 rounded-lg text-sm"
                       style={{ background: COLOR.bg, border: `1px solid ${COLOR.border}`, color: COLOR.text, fontFamily: 'var(--mono)', fontSize: '12px' }} />
                <div className="text-[11px] mt-1.5" style={{ color: COLOR.textMute }}>
                  승인된 JavaScript 원본에 <code style={{ color: COLOR.gold, background: COLOR.surfaceEl, padding: '1px 6px', borderRadius: 4 }}>{originUrl || 'file://'}</code> 를 등록하세요.
                  <br/>(로컬 파일로 열면 file:// 은 허용 안되어 로컬서버나 호스팅 필요)
                </div>
              </div>
              <div>
                <label className="text-xs font-medium mb-2 block" style={{ color: COLOR.textDim }}>마스터 스프레드시트 URL</label>
                <input type="text" value={formUrl} onChange={e => setFormUrl(e.target.value)}
                       placeholder="https://docs.google.com/spreadsheets/d/..."
                       className="w-full px-3 py-2 rounded-lg text-sm"
                       style={{ background: COLOR.bg, border: `1px solid ${COLOR.border}`, color: COLOR.text, fontFamily: 'var(--mono)', fontSize: '12px' }} />
              </div>
              <div>
                <label className="text-xs font-medium mb-2 block" style={{ color: COLOR.textDim }}>시트 탭 이름</label>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                  {[['accounts', '계좌 마스터'], ['transactions', '입출금 실적'], ['plans', '자금 계획']].map(([key, label]) => (
                    <div key={key}>
                      <div className="text-[10px] mb-1" style={{ color: COLOR.textMute }}>{label}</div>
                      <input type="text" value={formTabs[key]} onChange={e => setFormTabs({ ...formTabs, [key]: e.target.value })}
                             className="w-full px-3 py-2 rounded-lg text-sm"
                             style={{ background: COLOR.bg, border: `1px solid ${COLOR.border}`, color: COLOR.text, fontFamily: 'var(--mono)', fontSize: '12px' }} />
                    </div>
                  ))}
                </div>
              </div>
              <div className="flex justify-end">
                <button onClick={saveDriveSettings} className="px-4 py-2 rounded-lg text-sm font-semibold"
                        style={{ background: COLOR.gold, color: '#fff' }}>설정 저장</button>
              </div>
            </div>
          </Card>

          {/* 도움말 */}
          <Card className="p-5">
            <div className="text-sm font-semibold mb-3" style={{ color: COLOR.text }}>설정 가이드 (처음 한 번만)</div>
            <ol className="text-xs space-y-2 list-decimal pl-4" style={{ color: COLOR.textDim, lineHeight: 1.6 }}>
              <li><a href="https://console.cloud.google.com" target="_blank" rel="noopener" style={{ color: COLOR.gold }}>Google Cloud Console</a>에서 프로젝트 생성</li>
              <li>API 및 서비스 → 라이브러리 → <b style={{ color: COLOR.gold }}>Google Sheets API</b> 사용 설정</li>
              <li>사용자 인증 정보 → OAuth 클라이언트 ID 만들기 → <b style={{ color: COLOR.gold }}>웹 애플리케이션</b> 유형</li>
              <li>승인된 JavaScript 원본에 현재 주소 <code style={{ color: COLOR.gold, background: COLOR.surfaceEl, padding: '1px 4px', borderRadius: 3 }}>{originUrl || '(앱 URL)'}</code> 등록</li>
              <li>발급된 Client ID를 위 필드에 입력 → 저장 → Drive 연결 → 동기화</li>
            </ol>
          </Card>
        </>
      )}

      {/* 전체 데이터 관리 */}
      <Card className="p-5">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <div className="text-sm font-semibold mb-1" style={{ color: COLOR.text }}>전체 데이터 관리</div>
            <div className="text-xs" style={{ color: COLOR.textDim }}>
              데이터는 이 브라우저에 자동 저장됩니다.
            </div>
          </div>
          <button onClick={() => {
            if (confirm('데이터를 모두 삭제하고 빈 상태로 초기화하시겠습니까?')) onReset();
          }} className="px-3 py-2 rounded-lg text-xs flex items-center gap-1.5"
             style={{ color: COLOR.danger, background: `${COLOR.danger}14`, border: `1px solid ${COLOR.danger}40` }}>
            <RotateCcw size={13} />전체 초기화
          </button>
        </div>
      </Card>

      {/* === 데이터 진단 패널 (문제 진단용) === */}
      {(data.accounts.length > 0 || data.transactions.length > 0 || data.plans.length > 0) && (
        <Card className="overflow-hidden">
          <details>
            <summary className="px-5 py-4 cursor-pointer flex items-center gap-2" style={{ userSelect: 'none', borderBottom: `1px solid ${COLOR.border}` }}>
              <ChevronDown size={14} style={{ color: COLOR.textMute }} />
              <span className="text-sm font-semibold" style={{ color: COLOR.text }}>🔍 데이터 진단 (법인별 집계 · 매칭 상태)</span>
              <span className="text-[11px] ml-2" style={{ color: COLOR.textMute }}>— 특정 법인이 이상할 때 여기서 원인 확인</span>
            </summary>
            <div className="p-5 space-y-5">
              {/* 법인별 계좌/거래/계획 수 집계 */}
              {(() => {
                const entitiesSet = new Set([
                  ...data.accounts.map(a => a.entity),
                  ...data.transactions.map(t => t.entity),
                  ...data.plans.map(p => p.entity),
                ]);
                const entities = [...entitiesSet].sort();
                const stats = entities.map(e => {
                  const accs = data.accounts.filter(a => a.entity === e);
                  const txs = data.transactions.filter(t => t.entity === e);
                  const plans = data.plans.filter(p => p.entity === e);
                  const inflow = txs.reduce((s, t) => s + t.inflow, 0);
                  const outflow = txs.reduce((s, t) => s + t.outflow, 0);
                  return { entity: e, accs: accs.length, txs: txs.length, plans: plans.length, inflow, outflow, net: inflow - outflow };
                });
                return (
                  <div>
                    <div className="text-xs font-semibold mb-2" style={{ color: COLOR.text }}>① 법인별 데이터 집계</div>
                    <div className="text-[11px] mb-3" style={{ color: COLOR.textMute }}>
                      계좌/거래/계획 숫자가 0이거나 예상과 다르면, 해당 법인명이 각 시트에 정확히 일치하지 않는 거예요.
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-xs">
                        <thead style={{ background: COLOR.surfaceEl }}>
                          <tr>
                            <th className="px-3 py-2 text-left" style={{ color: COLOR.textMute, fontWeight: 500 }}>법인명</th>
                            <th className="px-3 py-2 text-right" style={{ color: COLOR.textMute, fontWeight: 500 }}>계좌</th>
                            <th className="px-3 py-2 text-right" style={{ color: COLOR.textMute, fontWeight: 500 }}>거래</th>
                            <th className="px-3 py-2 text-right" style={{ color: COLOR.textMute, fontWeight: 500 }}>계획</th>
                            <th className="px-3 py-2 text-right" style={{ color: COLOR.textMute, fontWeight: 500 }}>입금계</th>
                            <th className="px-3 py-2 text-right" style={{ color: COLOR.textMute, fontWeight: 500 }}>출금계</th>
                            <th className="px-3 py-2 text-right" style={{ color: COLOR.textMute, fontWeight: 500 }}>순증감</th>
                          </tr>
                        </thead>
                        <tbody>
                          {stats.map(s => {
                            const isProblem = s.accs === 0 || (s.txs === 0 && s.plans === 0);
                            return (
                              <tr key={s.entity} style={{ borderTop: `1px solid ${COLOR.border}`, background: isProblem ? `${COLOR.danger}10` : 'transparent' }}>
                                <td className="px-3 py-2 font-medium" style={{ color: COLOR.text, fontFamily: 'var(--mono)' }}>
                                  "{s.entity}"
                                  {isProblem && <span className="ml-2 text-[9px] px-1.5 py-0.5 rounded" style={{ color: COLOR.danger, background: `${COLOR.danger}25` }}>⚠ 확인필요</span>}
                                </td>
                                <td className="px-3 py-2 text-right tabular-nums" style={{ fontFamily: 'var(--mono)', color: s.accs === 0 ? COLOR.danger : COLOR.text }}>{s.accs}</td>
                                <td className="px-3 py-2 text-right tabular-nums" style={{ fontFamily: 'var(--mono)', color: s.txs === 0 ? COLOR.danger : COLOR.text }}>{s.txs}</td>
                                <td className="px-3 py-2 text-right tabular-nums" style={{ fontFamily: 'var(--mono)', color: s.plans === 0 ? COLOR.textMute : COLOR.text }}>{s.plans}</td>
                                <td className="px-3 py-2 text-right tabular-nums" style={{ fontFamily: 'var(--mono)', color: COLOR.success }}>{formatCompactKRW(s.inflow)}</td>
                                <td className="px-3 py-2 text-right tabular-nums" style={{ fontFamily: 'var(--mono)', color: COLOR.danger }}>{formatCompactKRW(s.outflow)}</td>
                                <td className="px-3 py-2 text-right tabular-nums font-medium" style={{ fontFamily: 'var(--mono)', color: s.net >= 0 ? COLOR.success : COLOR.danger }}>{formatCompactKRW(s.net)}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })()}

              {/* 법인명 불일치 감지 */}
              {(() => {
                const accEntities = new Set(data.accounts.map(a => a.entity));
                const txEntities = new Set(data.transactions.map(t => t.entity));
                const planEntities = new Set(data.plans.map(p => p.entity));
                const inTxNotInAcc = [...txEntities].filter(e => !accEntities.has(e));
                const inAccNotInTx = [...accEntities].filter(e => !txEntities.has(e));
                const inPlanNotInAcc = [...planEntities].filter(e => !accEntities.has(e));
                const hasIssue = inTxNotInAcc.length > 0 || inPlanNotInAcc.length > 0;

                if (!hasIssue) {
                  return (
                    <div style={{ background: `${COLOR.success}10`, border: `1px solid ${COLOR.success}35`, borderRadius: 8, padding: 12 }}>
                      <div className="text-xs font-semibold flex items-center gap-2" style={{ color: COLOR.success }}>
                        <CheckCircle2 size={12} /> ② 법인명 매칭 상태: 정상
                      </div>
                      <div className="text-[11px] mt-1" style={{ color: COLOR.textDim }}>
                        실적·계획의 모든 법인명이 계좌 마스터와 일치합니다.
                      </div>
                    </div>
                  );
                }

                return (
                  <div style={{ background: `${COLOR.danger}10`, border: `1px solid ${COLOR.danger}35`, borderRadius: 8, padding: 12 }}>
                    <div className="text-xs font-semibold flex items-center gap-2 mb-2" style={{ color: COLOR.danger }}>
                      <AlertCircle size={12} /> ② 법인명 매칭 문제 발견
                    </div>
                    {inTxNotInAcc.length > 0 && (
                      <div className="mb-2">
                        <div className="text-[11px] font-medium" style={{ color: COLOR.text }}>실적에 있지만 계좌 마스터에 없는 법인명:</div>
                        <div className="text-[11px] mt-1 space-y-0.5">
                          {inTxNotInAcc.map(e => (
                            <div key={e} style={{ fontFamily: 'var(--mono)', color: COLOR.danger }}>
                              "{e}" <span style={{ color: COLOR.textMute }}>(공백 주의: 글자 수 {e.length})</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {inPlanNotInAcc.length > 0 && (
                      <div>
                        <div className="text-[11px] font-medium" style={{ color: COLOR.text }}>계획에 있지만 계좌 마스터에 없는 법인명:</div>
                        <div className="text-[11px] mt-1 space-y-0.5">
                          {inPlanNotInAcc.map(e => (
                            <div key={e} style={{ fontFamily: 'var(--mono)', color: COLOR.danger }}>
                              "{e}" <span style={{ color: COLOR.textMute }}>(공백 주의: 글자 수 {e.length})</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    <div className="text-[11px] mt-2" style={{ color: COLOR.textDim }}>
                      💡 해결: Google Sheets에서 해당 법인명을 계좌 마스터 시트의 법인명과 완벽히 동일하게 수정 → 재동기화
                    </div>
                  </div>
                );
              })()}

              {/* 거래통장 매칭 */}
              {(() => {
                const accNums = new Set(data.accounts.map(a => a.number));
                const unmatchedTxs = data.transactions.filter(t => t.accountNumber && !accNums.has(t.accountNumber));
                const unmatchedNums = [...new Set(unmatchedTxs.map(t => t.accountNumber))];

                if (unmatchedNums.length === 0) {
                  return (
                    <div style={{ background: `${COLOR.success}10`, border: `1px solid ${COLOR.success}35`, borderRadius: 8, padding: 12 }}>
                      <div className="text-xs font-semibold flex items-center gap-2" style={{ color: COLOR.success }}>
                        <CheckCircle2 size={12} /> ③ 거래통장 ↔ 은행NO 매칭: 정상
                      </div>
                    </div>
                  );
                }

                return (
                  <div style={{ background: `${COLOR.danger}10`, border: `1px solid ${COLOR.danger}35`, borderRadius: 8, padding: 12 }}>
                    <div className="text-xs font-semibold flex items-center gap-2 mb-2" style={{ color: COLOR.danger }}>
                      <AlertCircle size={12} /> ③ 거래통장 매칭 문제: {unmatchedTxs.length}건 ({unmatchedNums.length}개 통장)
                    </div>
                    <div className="text-[11px] mb-2" style={{ color: COLOR.text }}>
                      실적에 있지만 계좌 마스터에 없는 거래통장:
                    </div>
                    <div className="text-[11px] space-y-0.5 max-h-32 overflow-y-auto" style={{ fontFamily: 'var(--mono)' }}>
                      {unmatchedNums.slice(0, 20).map(n => {
                        const sampleTx = unmatchedTxs.find(t => t.accountNumber === n);
                        return (
                          <div key={n} style={{ color: COLOR.danger }}>
                            "{n}" <span style={{ color: COLOR.textMute }}>({sampleTx?.entity} · {unmatchedTxs.filter(t => t.accountNumber === n).length}건)</span>
                          </div>
                        );
                      })}
                    </div>
                    <div className="text-[11px] mt-2" style={{ color: COLOR.textDim }}>
                      💡 해결: 실적 시트의 "거래통장" 값이 계좌 마스터의 "은행NO"와 정확히 같아야 해요. 하이픈/공백 등 주의.
                    </div>
                  </div>
                );
              })()}

              {/* 날짜 포맷 진단 */}
              {(() => {
                const badDates = data.transactions.filter(t => !t.date || !/^\d{4}-\d{2}-\d{2}/.test(t.date));
                if (badDates.length === 0) {
                  return (
                    <div style={{ background: `${COLOR.success}10`, border: `1px solid ${COLOR.success}35`, borderRadius: 8, padding: 12 }}>
                      <div className="text-xs font-semibold flex items-center gap-2" style={{ color: COLOR.success }}>
                        <CheckCircle2 size={12} /> ④ 거래일 포맷: 정상 (모든 거래의 날짜 파싱 성공)
                      </div>
                    </div>
                  );
                }
                const samples = [...new Set(badDates.slice(0, 20).map(t => t._raw?.['거래일'] || t.date))];
                return (
                  <div style={{ background: `${COLOR.warning || COLOR.danger}10`, border: `1px solid ${COLOR.danger}35`, borderRadius: 8, padding: 12 }}>
                    <div className="text-xs font-semibold flex items-center gap-2 mb-2" style={{ color: COLOR.danger }}>
                      <AlertCircle size={12} /> ④ 거래일 파싱 실패: {badDates.length}건
                    </div>
                    <div className="text-[11px] space-y-0.5" style={{ fontFamily: 'var(--mono)', color: COLOR.text }}>
                      {samples.slice(0, 10).map((d, i) => <div key={i}>"{d}"</div>)}
                    </div>
                  </div>
                );
              })()}
            </div>
          </details>
        </Card>
      )}
    </div>
  );
}
