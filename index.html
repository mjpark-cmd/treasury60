function FinanceDashboard() {
  const [tab, setTab] = useState('dashboard');
  const [entityFilter, setEntityFilter] = useState('all');
  const [planTypeChoice, setPlanTypeChoice] = useState('전체계획');
  const [planYearFilter, setPlanYearFilter] = useState('2026');
  const [actualizedMonths, setActualizedMonths] = useState(new Set());
  const [data, setData] = useState({ accounts: [], transactions: [], plans: [] });
  const [loaded, setLoaded] = useState(false);
  const [entityMenuOpen, setEntityMenuOpen] = useState(false);
  // 팀 설정 (Google Sheets의 "설정" 탭에서 동기화되는 공용 정보)
  const [teamSettings, setTeamSettings] = useState({ closingMonth: '', closedBy: '', closedAt: '', note: '' });
  // 차입금 현황 (Google Sheets "차입금현황" 탭에서 동기화)
  const [loans, setLoans] = useState({ headers: [], rows: [] });
  // Google Drive 연동 상태
  const [driveSettings, setDriveSettings] = useState(DEFAULT_DRIVE);
  const [accessToken, setAccessToken] = useState(null); // session only (never persisted)
  const [tokenClient, setTokenClient] = useState(null);
  // 자동 silent 로그인 시도 중 상태 (UI에 "연결 중..." 표시용)
  const [autoConnecting, setAutoConnecting] = useState(false);

  useEffect(() => {
    try {
      const a = localStorage.getItem(STORAGE_KEYS.accounts);
      const t = localStorage.getItem(STORAGE_KEYS.transactions);
      const p = localStorage.getItem(STORAGE_KEYS.plans);
      const am = localStorage.getItem('finance:v2:actualizedMonths');
      const dr = localStorage.getItem(STORAGE_KEYS.drive);
      setData({
        accounts: a ? JSON.parse(a) : [],
        transactions: t ? JSON.parse(t) : [],
        plans: p ? JSON.parse(p) : [],
      });
      if (am) setActualizedMonths(new Set(JSON.parse(am)));
      // 팀 설정 로드 (마감월 등)
      try {
        const ts = localStorage.getItem('finance:v2:teamSettings');
        if (ts) setTeamSettings(JSON.parse(ts));
      } catch {}
      // 차입금 로드
      try {
        const ln = localStorage.getItem('finance:v2:loans');
        if (ln) setLoans(JSON.parse(ln));
      } catch {}
      if (dr) {
        const parsed = JSON.parse(dr);
        setDriveSettings({
          ...DEFAULT_DRIVE,
          ...parsed,
          tabs: { ...DEFAULT_DRIVE.tabs, ...(parsed.tabs || {}) },
        });
      }
    } catch { setData({ accounts: [], transactions: [], plans: [] }); }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEYS.accounts, JSON.stringify(data.accounts));
      localStorage.setItem(STORAGE_KEYS.transactions, JSON.stringify(data.transactions));
      localStorage.setItem(STORAGE_KEYS.plans, JSON.stringify(data.plans));
    } catch {}
  }, [data, loaded]);

  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem('finance:v2:actualizedMonths', JSON.stringify([...actualizedMonths]));
    } catch {}
  }, [actualizedMonths, loaded]);

  // Drive 설정만 저장 (accessToken은 저장하지 않음 — 보안상 세션 메모리만)
  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEYS.drive, JSON.stringify(driveSettings));
    } catch {}
  }, [driveSettings, loaded]);

  // ⭐ 접속 시 자동 동기화
  // 조건: 이전에 Drive 설정이 있고 (Client ID + 시트 URL 저장됨),
  //       Google GIS가 로드되었으며, 아직 accessToken이 없는 경우
  // 동작: 팝업 없이 Silent 로그인 시도 → 성공하면 자동 동기화
  //       (최근 로그인 이력이 있고 토큰이 살아있으면 팝업 없이 즉시 동기화됨)
  const autoSyncAttempted = React.useRef(false);
  useEffect(() => {
    if (!loaded) return;
    if (autoSyncAttempted.current) return;
    if (!driveSettings.clientId || !driveSettings.spreadsheetUrl) return;
    if (accessToken) return;

    // GIS가 아직 로드 안 됐으면 짧게 기다렸다가 재시도 (최대 5초)
    const trySilentLogin = (retryCount = 0) => {
      if (!window.google?.accounts?.oauth2) {
        if (retryCount >= 10) return; // 포기
        setTimeout(() => trySilentLogin(retryCount + 1), 500);
        return;
      }

      autoSyncAttempted.current = true;
      setAutoConnecting(true);

      // 7초 타임아웃 - silent 로그인이 너무 오래 걸리면 포기
      const timeoutId = setTimeout(() => setAutoConnecting(false), 7000);

      try {
        const silentClient = window.google.accounts.oauth2.initTokenClient({
          client_id: driveSettings.clientId,
          scope: OAUTH_SCOPE,
          callback: async (response) => {
            clearTimeout(timeoutId);
            if (response.error || !response.access_token) {
              // Silent 실패 = 사용자가 직접 "Drive 연결" 눌러야 함 (정상)
              setAutoConnecting(false);
              return;
            }
            setAccessToken(response.access_token);
            // 자동 동기화 실행
            const ssid = extractSpreadsheetId(driveSettings.spreadsheetUrl);
            if (!ssid) { setAutoConnecting(false); return; }
            try {
              const [accArr, txArr, planArr, settingsArr, loansArr] = await Promise.all([
                fetchSheetArray(ssid, driveSettings.tabs.accounts, response.access_token),
                fetchSheetArray(ssid, driveSettings.tabs.transactions, response.access_token),
                fetchSheetArray(ssid, driveSettings.tabs.plans, response.access_token),
                fetchSheetArray(ssid, driveSettings.tabs.settings || '설정', response.access_token).catch(() => []),
                fetchSheetRange(ssid, driveSettings.tabs.loans || '차입금현황', 'B8:R10000', response.access_token).catch(() => []),
              ]);
              const accHR = sheetArrayToRowsWithHeaders(accArr);
              const txHR = sheetArrayToRowsWithHeaders(txArr);
              const planHR = sheetArrayToRowsWithHeaders(planArr);
              const accounts = parseAccountsFile(accHR.headers, accHR.rows);
              const transactions = parseActualsFile(txHR.headers, txHR.rows);
              const plans = parsePlansFile(planHR.headers, planHR.rows);
              const parsedSettings = parseTeamSettings(settingsArr);
              const entitiesFromAccounts = [...new Set(accounts.map(a => a.entity))].filter(Boolean);
              const parsedLoans = parseLoans(loansArr, entitiesFromAccounts);
              setData({ accounts, transactions, plans });
              try { localStorage.setItem('finance:v2:teamSettings', JSON.stringify(parsedSettings)); } catch {}
              setTeamSettings(parsedSettings);
              try { localStorage.setItem('finance:v2:loans', JSON.stringify(parsedLoans)); } catch {}
              setLoans(parsedLoans);
              const now = new Date().toISOString();
              try { localStorage.setItem('finance:v2:lastSync', now); } catch {}
            } catch (e) {
              console.warn('Auto-sync failed:', e.message);
            } finally {
              setAutoConnecting(false);
            }
          },
        });
        silentClient.requestAccessToken({ prompt: 'none' });
      } catch (e) {
        clearTimeout(timeoutId);
        setAutoConnecting(false);
      }
    };

    trySilentLogin();
  }, [loaded, driveSettings.clientId, driveSettings.spreadsheetUrl]);

  // ⭐ 과거 시점 조회 (시점 여행)
  // null이면 기본 마감월, 특정 월 선택 시 해당 월까지만 실적 반영
  const [cutoffOverride, setCutoffOverride] = useState(null);

  // ⭐ 마감월 기준 실적 반영 월 자동 계산
  // 시트 "설정" 탭의 marginMonth="2026-03" → {2026-01, 2026-02, 2026-03}
  // cutoffOverride가 있으면 그 시점까지만 사용 (과거 시점 조회)
  const effectiveActualizedMonths = useMemo(() => {
    const activeCutoff = cutoffOverride || teamSettings.closingMonth;
    if (!activeCutoff) return new Set();
    const m = activeCutoff.match(/^(\d{4})-(\d{2})$/);
    if (!m) return new Set();
    const year = parseInt(m[1]);
    const month = parseInt(m[2]);
    // 데이터 내 가장 이른 거래월 ~ 활성 마감월까지 전부 포함
    const allTxMonths = [...new Set((data.transactions || [])
      .map(t => t.date?.slice(0, 7))
      .filter(s => /^\d{4}-\d{2}$/.test(s || '')))].sort();
    const earliest = allTxMonths[0] || `${year}-01`;
    // earliest부터 activeCutoff까지 월 시퀀스 생성
    const result = new Set();
    const [ey, em] = earliest.split('-').map(Number);
    let curY = ey, curM = em;
    while (curY < year || (curY === year && curM <= month)) {
      result.add(`${curY}-${String(curM).padStart(2, '0')}`);
      curM++;
      if (curM > 12) { curM = 1; curY++; }
    }
    return result;
  }, [teamSettings.closingMonth, cutoffOverride, data.transactions]);

  // 선택 가능한 과거 시점 목록 (시트 마감월 이전의 모든 월)
  const historicalCutoffOptions = useMemo(() => {
    if (!teamSettings.closingMonth) return [];
    const m = teamSettings.closingMonth.match(/^(\d{4})-(\d{2})$/);
    if (!m) return [];
    const maxYear = parseInt(m[1]);
    const maxMonth = parseInt(m[2]);
    // 거래 데이터가 있는 월들 중에서
    const allTxMonths = [...new Set((data.transactions || [])
      .map(t => t.date?.slice(0, 7))
      .filter(s => /^\d{4}-\d{2}$/.test(s || '')))].sort();
    if (allTxMonths.length === 0) return [];
    // earliest부터 closingMonth까지
    const result = [];
    const [ey, em] = allTxMonths[0].split('-').map(Number);
    let curY = ey, curM = em;
    while (curY < maxYear || (curY === maxYear && curM <= maxMonth)) {
      result.push(`${curY}-${String(curM).padStart(2, '0')}`);
      curM++;
      if (curM > 12) { curM = 1; curY++; }
    }
    return result;
  }, [teamSettings.closingMonth, data.transactions]);

  const metrics = useMemo(() => calcMetrics(data, entityFilter, planTypeChoice, effectiveActualizedMonths, planYearFilter), [data, entityFilter, planTypeChoice, effectiveActualizedMonths, planYearFilter]);
  const allEntities = metrics.allEntities || [];
  const currentEntity = entityFilter === 'all' ? '전체 법인' : entityFilter;

  const resetAll = () => setData({ accounts: [], transactions: [], plans: [] });

  if (!loaded) return <div style={{ padding: 40, color: COLOR.textDim }}>Loading...</div>;

  const hasData = data.accounts.length > 0 || data.transactions.length > 0 || data.plans.length > 0;

  return (
    <div style={{ background: COLOR.bg, color: COLOR.text, minHeight: '100vh' }}>
      <div style={{ maxWidth: 1400, margin: '0 auto', padding: '24px' }}>
        <header className="flex items-center justify-between mb-6 gap-4 flex-wrap">
          <div className="flex items-center gap-4">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: `linear-gradient(135deg, ${COLOR.gold}, ${COLOR.goldHi})` }}>
              <DollarSign size={20} style={{ color: '#fff' }} strokeWidth={2.5} />
            </div>
            <div>
              <div style={{ fontFamily: 'var(--serif)', fontStyle: 'italic', fontSize: '22px', color: COLOR.text, letterSpacing: '-0.01em' }}>Treasury</div>
              <div className="text-xs" style={{ color: COLOR.textMute, letterSpacing: '0.1em' }}>
                그룹 통합 자금관리 · {allEntities.length > 0 ? `${allEntities.length}개 법인` : '데이터 없음'}
              </div>
            </div>
          </div>
          {allEntities.length > 0 && (
            <div className="flex items-center gap-3 flex-wrap">
              {accessToken ? (
                <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[11px]"
                     style={{ background: `${COLOR.success}14`, color: COLOR.success, border: `1px solid ${COLOR.success}40` }}>
                  <Cloud size={11} /> Drive 연결됨
                </div>
              ) : autoConnecting ? (
                <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[11px]"
                     style={{ background: `${COLOR.gold}14`, color: COLOR.gold, border: `1px solid ${COLOR.gold}40` }}>
                  <Spinner size={10} /> Drive 연결 중...
                </div>
              ) : null}
              <div style={{ position: 'relative' }}>
                <button onClick={() => setEntityMenuOpen(v => !v)} className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm"
                        style={{ background: COLOR.surfaceEl, border: `1px solid ${COLOR.border}`, color: COLOR.text }}>
                  <Building2 size={14} style={{ color: COLOR.gold }} />{currentEntity}<ChevronDown size={14} style={{ color: COLOR.textDim }} />
                </button>
                {entityMenuOpen && (
                  <div style={{ position: 'absolute', right: 0, top: '100%', marginTop: 4, zIndex: 20, minWidth: 220, background: COLOR.surfaceEl, border: `1px solid ${COLOR.borderHi}`, borderRadius: 8, overflow: 'hidden', boxShadow: '0 10px 30px rgba(0,0,0,0.4)' }}>
                    <button onClick={() => { setEntityFilter('all'); setEntityMenuOpen(false); }}
                            style={{ display: 'block', width: '100%', textAlign: 'left', padding: '8px 16px', fontSize: 14, background: 'transparent', color: entityFilter === 'all' ? COLOR.gold : COLOR.text }}>전체 법인</button>
                    <div style={{ height: 1, background: COLOR.border }} />
                    {allEntities.map(e => (
                      <button key={e} onClick={() => { setEntityFilter(e); setEntityMenuOpen(false); }}
                              style={{ display: 'block', width: '100%', textAlign: 'left', padding: '8px 16px', fontSize: 14, background: 'transparent', color: entityFilter === e ? COLOR.gold : COLOR.text }}>
                        {e}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </header>

        <nav className="flex gap-1 mb-6 p-1 rounded-xl" style={{ background: COLOR.surface, border: `1px solid ${COLOR.border}`, display: 'inline-flex', flexWrap: 'wrap' }}>
          <TabButton active={tab === 'dashboard'} onClick={() => setTab('dashboard')} icon={LayoutDashboard}>대시보드</TabButton>
          <TabButton active={tab === 'accounts'} onClick={() => setTab('accounts')} icon={Wallet}>계좌</TabButton>
          <TabButton active={tab === 'transactions'} onClick={() => setTab('transactions')} icon={Receipt}>입출금</TabButton>
          <TabButton active={tab === 'plans'} onClick={() => setTab('plans')} icon={CalendarIcon}>자금계획</TabButton>
          <TabButton active={tab === 'loans'} onClick={() => setTab('loans')} icon={CreditCard}>차입금</TabButton>
          <TabButton active={tab === 'categories'} onClick={() => setTab('categories')} icon={FilterIcon}>분류 분석</TabButton>
          <TabButton active={tab === 'import'} onClick={() => setTab('import')} icon={Upload}>데이터 가져오기</TabButton>
        </nav>

        <main>
          {!hasData && tab !== 'import' && (
            <Card className="p-12 text-center">
              <div className="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4" style={{ background: `${COLOR.gold}18`, color: COLOR.gold }}>
                <Upload size={28} />
              </div>
              <div className="text-lg font-semibold mb-2" style={{ color: COLOR.text }}>데이터가 없습니다</div>
              <div className="text-sm mb-6" style={{ color: COLOR.textDim }}>먼저 "데이터 가져오기" 탭에서 CSV 파일을 업로드하세요.</div>
              <button onClick={() => setTab('import')} className="px-5 py-2.5 rounded-lg text-sm font-semibold"
                      style={{ background: COLOR.gold, color: '#fff' }}>
                데이터 가져오기로 이동
              </button>
            </Card>
          )}

          {hasData && tab === 'dashboard'    && <DashboardView    metrics={metrics} planTypeChoice={planTypeChoice} setPlanTypeChoice={setPlanTypeChoice} planYearFilter={planYearFilter} setPlanYearFilter={setPlanYearFilter} actualizedMonths={effectiveActualizedMonths} setActualizedMonths={setActualizedMonths} teamSettings={teamSettings} cutoffOverride={cutoffOverride} setCutoffOverride={setCutoffOverride} historicalCutoffOptions={historicalCutoffOptions} />}
          {hasData && tab === 'accounts'     && <AccountsView     metrics={metrics} teamSettings={teamSettings} cutoffOverride={cutoffOverride} setCutoffOverride={setCutoffOverride} historicalCutoffOptions={historicalCutoffOptions} />}
          {hasData && tab === 'transactions' && <TransactionsView metrics={metrics} />}
          {hasData && tab === 'plans'        && <PlansView        metrics={metrics} />}
          {hasData && tab === 'loans'        && <LoansView        loans={loans} entityFilter={entityFilter} />}
          {hasData && tab === 'categories'   && <CategoryAnalysisView metrics={metrics} />}
          {tab === 'import'                  && <ImportView
            data={data} setData={setData} onReset={resetAll}
            driveSettings={driveSettings} setDriveSettings={setDriveSettings}
            accessToken={accessToken} setAccessToken={setAccessToken}
            tokenClient={tokenClient} setTokenClient={setTokenClient}
            teamSettings={teamSettings} setTeamSettings={setTeamSettings}
            setLoans={setLoans}
          />}
        </main>

        <footer className="mt-8 pt-6 text-xs flex items-center justify-between" style={{ color: COLOR.textMute, borderTop: `1px solid ${COLOR.border}` }}>
          <div>데이터는 이 브라우저의 localStorage에 저장됩니다.</div>
          <div style={{ fontFamily: 'var(--mono)' }}>{new Date().toISOString().slice(0, 10)}</div>
        </footer>
      </div>
    </div>
  );
}

document.getElementById('loading').style.display = 'none';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FinanceDashboard />);
</script>
</body>
</html>
