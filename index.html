function extractSpreadsheetId(urlOrId) {
  if (!urlOrId) return null;
  const s = urlOrId.trim();
  const m = s.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9-_]{30,}$/.test(s)) return s;
  return null;
}

async function fetchSheetArray(spreadsheetId, sheetName, token) {
  const range = encodeURIComponent(`${sheetName}!A1:Z10000`);
  // FORMATTED_VALUE: 사용자가 시트에서 보는 그대로 문자열 반환
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${range}?valueRenderOption=FORMATTED_VALUE&dateTimeRenderOption=FORMATTED_STRING`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.values || [];
}

// 특정 범위 지정해서 가져오기 (차입금 시트처럼 B8부터 시작하는 경우)
async function fetchSheetRange(spreadsheetId, sheetName, a1Range, token) {
  const range = encodeURIComponent(`${sheetName}!${a1Range}`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${range}?valueRenderOption=FORMATTED_VALUE&dateTimeRenderOption=FORMATTED_STRING`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.values || [];
}

// 차입금 시트 전용 파싱
// 입력: B8:R 범위의 2D 배열 (첫 행은 헤더, 2번째 행부터 데이터)
// 처리: H/I/L 열(B기준 인덱스 6, 7, 10) 제외 → 나머지 유지
// 필터: B열(인덱스 0, 법인명)이 entityList에 포함되는 행만
function parseLoans(valuesB8toR, entityList) {
  if (!valuesB8toR || valuesB8toR.length < 2) return { headers: [], rows: [] };
  // B~R = 17개 열 (B=0, C=1, D=2, E=3, F=4, G=5, H=6, I=7, J=8, K=9, L=10, M=11, N=12, O=13, P=14, Q=15, R=16)
  // 제외할 인덱스: H(6), I(7), L(10)
  const SKIP_IDX = new Set([6, 7, 10]);
  const entitySet = new Set((entityList || []).map(e => String(e).trim()).filter(Boolean));

  const pickCols = (row) => {
    const r = row || [];
    const out = [];
    for (let i = 0; i <= 16; i++) {
      if (SKIP_IDX.has(i)) continue;
      out.push(r[i] == null ? '' : String(r[i]));
    }
    return out;
  };

  const headers = pickCols(valuesB8toR[0]);
  const rows = [];
  for (let i = 1; i < valuesB8toR.length; i++) {
    const raw = valuesB8toR[i];
    if (!raw || raw.length === 0) continue;
    const entityCell = String(raw[0] || '').trim();
    // B열(법인명)이 빈 행 건너뛰기
    if (!entityCell) continue;
    // 대시보드 법인 목록에 포함된 것만
    if (entitySet.size > 0 && !entitySet.has(entityCell)) continue;
    const cols = pickCols(raw);
    // 객체 형태로 변환 ({헤더명: 값})
    const obj = {};
    headers.forEach((h, idx) => {
      obj[h || `열${idx + 1}`] = cols[idx] || '';
    });
    obj._entity = entityCell;
    obj._raw = cols;
    rows.push(obj);
  }
  return { headers, rows };
}

// Sheets 2D 배열 → CSV 텍스트 변환 (CSV 업로드와 동일한 파싱 경로 보장)
function sheetArrayToCSV(values) {
  if (!values || values.length === 0) return '';
  return values.map(row => {
    return (row || []).map(cell => {
      const s = cell == null ? '' : String(cell);
      // 콤마, 따옴표, 줄바꿈 포함하면 따옴표로 감싸기 (CSV 표준)
      if (/[",\n\r]/.test(s)) {
        return `"${s.replace(/"/g, '""')}"`;
      }
      return s;
    }).join(',');
  }).join('\n');
}

// Sheets 동기화: 2D 배열 → CSV 문자열 → 파일 업로드와 동일한 parseCSV 사용
function sheetArrayToRowsWithHeaders(values) {
  const csvText = sheetArrayToCSV(values);
  return parseCSV(csvText);
}

// Google Sheets API의 2D 배열을 { headers, rows } 로 변환
function arrayToRowsWithHeaders(values) {
  if (!values || values.length === 0) return { headers: [], rows: [] };
  const headers = values[0].map(h => String(h || '').trim());
  let lastNonEmpty = headers.length - 1;
  while (lastNonEmpty >= 0 && headers[lastNonEmpty] === '') lastNonEmpty--;
  const cleanHeaders = headers.slice(0, lastNonEmpty + 1);
  const rows = values.slice(1).map(row => {
    const obj = {};
    cleanHeaders.forEach((h, i) => { obj[h] = row[i] != null ? String(row[i]).trim() : ''; });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v !== ''));
  return { headers: cleanHeaders, rows };
}

// 팀 설정 파싱: 2D 배열 [키, 값] 형태에서 { 키: 값 } 객체로 변환

    '실적 마감월': 'closingMonth',
    'closing_month': 'closingMonth',

    '마감일': 'closedAt',
    '마감일시': 'closedAt',
    '확정일': 'closedAt',
    'closed_at': 'closedAt',
    '비고': 'note',
    '메모': 'note',
    'note': 'note',
  };

  for (let i = 1; i < values.length; i++) {
    const row = values[i] || [];
    const key = String(row[0] ?? '').trim();
    const val = String(row[1] ?? '').trim();
    if (!key) continue;
    const field = keyMap[key] || keyMap[key.toLowerCase()];
    if (field) result[field] = val;
  }

  // 마감월 정규화: "2026-03", "Mar-26", "2026년 3월", "2026.3" 등 → "2026-03"
  if (result.closingMonth) {

  return result;
}

function parseCSV(text) {
  // Remove BOM
  text = text.replace(/^\uFEFF/, '');
  // Normalize line endings
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  const rows = [];
  let cur = '', inQuote = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQuote && text[i + 1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === ',' && !inQuote) {
      row.push(cur); cur = '';
    } else if (c === '\n' && !inQuote) {
      row.push(cur); cur = '';
      rows.push(row); row = [];
    } else cur += c;
  }
  if (cur !== '' || row.length > 0) { row.push(cur); rows.push(row); }

  // Drop trailing fully empty rows
  while (rows.length > 0 && rows[rows.length - 1].every(c => c === '')) rows.pop();
  if (rows.length === 0) return { headers: [], rows: [] };

  // Headers: trim and drop trailing empty headers
  const rawHeaders = rows[0].map(h => h.trim());
  let lastNonEmpty = rawHeaders.length - 1;
  while (lastNonEmpty >= 0 && rawHeaders[lastNonEmpty] === '') lastNonEmpty--;
  const headers = rawHeaders.slice(0, lastNonEmpty + 1);

  const dataRows = rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (r[i] ?? '').trim(); });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v !== ''));
  return { headers, rows: dataRows };
}

// ============================================================================
//  UTILITIES
// ============================================================================
function parseNumber(s) {
  if (s == null || s === '') return 0;
  if (typeof s === 'number') return isFinite(s) ? s : 0;
  if (typeof s === 'boolean') return s ? 1 : 0;
  const str = String(s).trim();
  if (!str) return 0;
  const negWrapped = /^\(.*\)$/.test(str);
  // 콤마, 통화기호, 공백, 괄호 제거. 마이너스는 보존
  const cleaned = str.replace(/[,₩$\s원()]/g, '');
  if (cleaned === '' || cleaned === '-') return 0;
  const n = parseFloat(cleaned);
  if (isNaN(n)) return 0;
  return negWrapped ? -n : n;
}

// 한국식 날짜 "2026. 1. 6", "2026-01-06", "2026/1/6", ISO, Excel serial 등 → "YYYY-MM-DD"
function normalizeDate(s) {
  if (s == null || s === '') return '';
  // Date 객체
  if (s instanceof Date && !isNaN(s)) {
    return `${s.getFullYear()}-${String(s.getMonth() + 1).padStart(2, '0')}-${String(s.getDate()).padStart(2, '0')}`;
  }
  // Excel/Sheets 일련번호 (1900년 기준 누적 일수)
  if (typeof s === 'number' && s > 20000 && s < 100000) {
    const excelEpoch = new Date(1899, 11, 30);
    const d = new Date(excelEpoch.getTime() + s * 86400000);
    if (!isNaN(d)) return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }
  const str = String(s).trim();
  if (!str) return '';
  // ISO 형식: "2026-01-06T00:00:00.000Z" 또는 "2026-01-06"
  if (/^\d{4}-\d{1,2}-\d{1,2}/.test(str)) {
    const m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
  }
  // "2026. 1. 6" or "2026.1.6" or "2026/1/6"
  const m = str.match(/^(\d{4})\s*[\.\-\/]\s*(\d{1,2})\s*[\.\-\/]\s*(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
  // "1/6/2026" 또는 "1-6-2026" (미국식: M/D/YYYY)
  const mUS = str.match(/^(\d{1,2})\s*[\/\-]\s*(\d{1,2})\s*[\/\-]\s*(\d{4})/);
  if (mUS) return `${mUS[3]}-${mUS[1].padStart(2, '0')}-${mUS[2].padStart(2, '0')}`;
  // "20260106" 형태
  const m2 = str.match(/^(\d{4})(\d{2})(\d{2})$/);
  if (m2) return `${m2[1]}-${m2[2]}-${m2[3]}`;
  // Date() 생성자로 마지막 시도
  const d = new Date(str);
  if (!isNaN(d)) return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  return str.slice(0, 10);
}

// "Apr-26" → "2026-04" / "Jan-27" → "2027-01" / 2026-04-01 → "2026-04"
function normalizeMonthKey(s) {
  if (s == null || s === '') return '';
  // Date 객체
  if (s instanceof Date && !isNaN(s)) {
    return `${s.getFullYear()}-${String(s.getMonth() + 1).padStart(2, '0')}`;
  }
  // Excel/Sheets 일련번호
  if (typeof s === 'number' && s > 20000 && s < 100000) {
    const excelEpoch = new Date(1899, 11, 30);
    const d = new Date(excelEpoch.getTime() + s * 86400000);
    if (!isNaN(d)) return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  }
  const str = String(s).trim();
  if (!str) return '';
  // 이미 YYYY-MM
  if (/^\d{4}-\d{2}$/.test(str)) return str;
  // Apr-26 형식 (CSV 원본)
  const m = str.match(/^([A-Za-z]{3})-?(\d{2,4})$/);
  if (m) {
    const key = m[1].slice(0, 1).toUpperCase() + m[1].slice(1, 3).toLowerCase();
    const monthNum = MONTH_ABBR_TO_NUM[key];
    if (monthNum) {
      let year = m[2];
      if (year.length === 2) year = (parseInt(year) < 70 ? '20' : '19') + year;
      return `${year}-${monthNum}`;
    }
  }
  // "2026년 4월" 한국어 형식
  const mKo = str.match(/(\d{4})\s*년?\s*(\d{1,2})\s*월?/);
  if (mKo) return `${mKo[1]}-${mKo[2].padStart(2, '0')}`;
  // 날짜 형식이면 앞 7자리
  const d = normalizeDate(str);
  if (/^\d{4}-\d{2}-\d{2}/.test(d)) return d.slice(0, 7);
  return str;
}

function formatKRW(n, withSign = false) {
  if (n == null || isNaN(n)) return '—';
  const sign = n < 0 ? '-' : (withSign && n > 0 ? '+' : '');
  return `${sign}₩${Math.abs(Math.round(n)).toLocaleString('ko-KR')}`;
}
function formatCompactKRW(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n); const sign = n < 0 ? '-' : '';
  if (abs >= 100_000_000) return `${sign}${(abs / 100_000_000).toFixed(1)}억`;
  if (abs >= 10_000)      return `${sign}${Math.round(abs / 10_000).toLocaleString()}만`;
  return `${sign}${abs.toLocaleString()}`;
}
const formatPct = (n, d = 1) => (n == null || isNaN(n)) ? '—' : `${n.toFixed(d)}%`;
const isYes = (v) => {
  if (v == null || v === '') return false;
  if (typeof v === 'boolean') return v;
  if (typeof v === 'number') return v === 1;
  const s = String(v).trim().toUpperCase();
  return s === 'Y' || s === 'YES' || s === 'TRUE' || s === '1' || s === 'O' || s === '○';
};
const looksNumeric = (v) => {
  if (v == null || v === '') return false;
  const s = String(v).trim();
  if (!s) return false;
  // 숫자, 콤마, 소수점, 음수 부호, 괄호(음수 표기) 허용
  return /^-?\(?\-?[\d,]+(\.\d+)?\)?$/.test(s.replace(/\s/g, ''));
};
// 테이블 셀 숫자 자동 콤마 서식 (정수만, 소수점 있으면 원본 유지)
function formatTableNumber(v) {
  if (v == null || v === '') return '';
  const s = String(v).trim();
  if (!s) return '';
  // 괄호로 음수 표기된 경우 처리: (1,000) → -1000
  let isNeg = false;
  let clean = s.replace(/,/g, '').replace(/\s/g, '');
  if (/^\(.*\)$/.test(clean)) {
    isNeg = true;
    clean = clean.slice(1, -1);
  }
  if (!/^-?\d+(\.\d+)?$/.test(clean)) return s;
  const n = Number(clean) * (isNeg ? -1 : 1);
  if (!isFinite(n)) return s;
  if (n === 0) return '0';
  // 정수면 콤마, 소수점 있으면 정수부만 콤마
  if (Number.isInteger(n)) return n.toLocaleString('ko-KR');
  const parts = Math.abs(n).toString().split('.');
  return (n < 0 ? '-' : '') + Number(parts[0]).toLocaleString('ko-KR') + '.' + parts[1];
}

// ============================================================================
//  CSV EXPORT
// ============================================================================
function exportCSV(filename, rows, headers) {
  const headerLine = headers.map(h => `"${h}"`).join(',');
  const lines = rows.map(row =>
    headers.map(h => {
      const v = row[h];
      if (v == null) return '';
      const s = String(v).replace(/"/g, '""');
      return `"${s}"`;
    }).join(',')
  );
  const csv = '\uFEFF' + [headerLine, ...lines].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================================
//  SPECIFIC FILE PARSERS (tailored to user's actual CSV structure)
// ============================================================================
// Accounts: 법인명, 계좌구분, 자금구분, 은행NO, 기초금액, 순수자금_런웨이(Y/N), 가용자금_런웨이(Y/N), 재무제표_런웨이(Y/N)
// 한도약정계좌 한도:
//   - 농협 계좌: 각 7.5억 (은행NO에서 자동 판단)
//   - 기업은행 한도약정: 9억 별도 (계좌 마스터에 없는 별도 항목, 아래 CONFIG에 표시만)
const SEPARATE_CREDIT_LINES = [
  { name: '기업은행 한도약정', entity: '식스티헤르츠', limit: 900_000_000 },
];

function getCreditLimit(number, accountType) {
  if (accountType !== '한도약정계좌') return 0;
  if (/농협/.test(number)) return 750_000_000;
  return 0;
}

function parseAccountsFile(headers, rows) {
  return rows.map((r, i) => {
    const number = String(r['은행NO'] ?? '').trim();
    const accountType = r['계좌구분'] || '';
    return {
      id: `acc_${i}`,
      _raw: r,
      _headers: headers,
      entity: r['법인명'] || '',
      accountType,
      fundType: r['자금구분'] || '',
      number,
      // 계좌성격/계좌용도 (운영비_주거래, R&D, 급여 등) — 시트의 선택 필드
      usage: String(r['계좌성격'] || r['계좌용도'] || '').trim(),
      openingBalance: parseNumber(r['기초금액']),
      // 런웨이 플래그: CSV 원본(Y/N 없이) 또는 (Y/N) 붙은 변형 둘 다 허용
      isPure: isYes(r['순수자금_런웨이(Y/N)'] ?? r['순수자금_런웨이'] ?? r['순수자금런웨이']),
      isAvailable: isYes(r['가용자금_런웨이(Y/N)'] ?? r['가용자금_런웨이'] ?? r['가용자금런웨이']),
      isFinancial: isYes(r['재무제표_런웨이(Y/N)'] ?? r['재무제표_런웨이'] ?? r['재무제표런웨이']),
      limit: getCreditLimit(number, accountType),
    };
  }).filter(a => a.entity && a.number);
}

// Actuals: 법인명, 거래일, 거래처명, 내용, 분류, 계정과목, 입금, 출금, 거래통장(은행NO)
function parseActualsFile(headers, rows) {
  return rows.map((r, i) => {
    const inAmt = parseNumber(r['입금']);
    const outAmt = parseNumber(r['출금']);
    const amount = inAmt - outAmt;
    return {
      id: `tx_${i}`,
      _raw: r,
      _headers: headers,
      entity: r['법인명'] || '',
      date: normalizeDate(r['거래일']),
      counterpart: r['거래처명'] || '',
      description: r['내용'] || '',
      category: r['분류'] || '',
      account: r['계정과목'] || '',
      inflow: inAmt,
      outflow: outAmt,
      amount,
      // 거래통장 컬럼: 여러 변형 허용
      accountNumber: String(r['거래통장(은행NO)'] ?? r['거래통장'] ?? r['은행NO'] ?? '').trim(),
    };
  }).filter(t => t.entity && t.date);
}

// Plans: 법인명, 계획구분, 주체구분, 해당월, 거래처명, 계정과목, 내용, 입금액, 출금액
function parsePlansFile(headers, rows) {
  return rows.map((r, i) => {
    const inAmt = parseNumber(r['입금액']);
    const outAmt = parseNumber(r['출금액']);
    const amount = inAmt - outAmt;
    return {
      id: `plan_${i}`,
      _raw: r,
      _headers: headers,
      entity: r['법인명'] || '',
      planType: r['계획구분'] || '',
      subjectType: r['주체구분'] || '',
      monthRaw: r['해당월'] || '',
      month: normalizeMonthKey(r['해당월']),
      counterpart: r['거래처명'] || '',
      account: r['계정과목'] || '',
      description: r['내용'] || '',
      inflow: inAmt,
      outflow: outAmt,
      amount,
    };
  }).filter(p => p.entity && p.month);
}

// ============================================================================
//  METRICS
// ============================================================================
function calcAccountBalance(account, transactions) {
  const txs = transactions.filter(t => t.accountNumber === account.number);
  return account.openingBalance + txs.reduce((s, t) => s + t.amount, 0);
}

function calcMetrics(data, entityFilter, planTypeChoice = '전체계획', actualizedMonths = new Set(), planYearFilter = '2026') {
  const { accounts, transactions, plans } = data;
  const filteredAccounts = entityFilter === 'all' ? accounts : accounts.filter(a => a.entity === entityFilter);
  const accNums = new Set(filteredAccounts.map(a => a.number));
  const filteredTxs = transactions.filter(t => accNums.has(t.accountNumber));
  const filteredPlans = entityFilter === 'all' ? plans : plans.filter(p => p.entity === entityFilter);

  // 계획 데이터에서 사용 가능한 연도 목록 추출
  const planYears = [...new Set(plans.map(p => (p.month || '').slice(0, 4)))]
    .filter(y => /^\d{4}$/.test(y)).sort();

  // 체크된 월이 있으면 그 월들까지의 실적만 반영. 없으면 전체 실적 반영.
  const useMonthFilter = actualizedMonths.size > 0;
  const txsForBalance = useMonthFilter
    ? transactions.filter(t => actualizedMonths.has(t.date.slice(0, 7)))
    : transactions;

  const balances = filteredAccounts.map(acc => {
    const accTxs = txsForBalance.filter(t => t.accountNumber === acc.number);
    const currentBalance = acc.openingBalance + accTxs.reduce((s, t) => s + t.amount, 0);
    return {
      ...acc,
      // 저장된 데이터에 limit 필드가 없으면 재계산 (마이그레이션)
      limit: acc.limit != null ? acc.limit : getCreditLimit(acc.number, acc.accountType),
      currentBalance,
      txSum: currentBalance - acc.openingBalance,
      inflowSum: accTxs.reduce((s, t) => s + t.inflow, 0),
      outflowSum: accTxs.reduce((s, t) => s + t.outflow, 0),
    };
  });

  // 실적 반영 컷오프 라벨 (UI 표시용)
  const sortedChecked = [...actualizedMonths].sort();
  const cutoffLabel = useMonthFilter
    ? (sortedChecked.length === 1
        ? `${sortedChecked[0]} 실적 반영`
        : `${sortedChecked[0]} ~ ${sortedChecked[sortedChecked.length - 1]} 실적 반영`)
    : '전체 실적 반영';

  // === 자금 합계 계산 ===
  // 순수자금: 순수자금_런웨이(Y) 플래그가 있는 계좌만 — 한도약정계좌 제외
  // 가용자금: 가용자금_런웨이(Y) + 한도약정계좌 (잔액 +면 합산, -면 차감)
  let pureFunds = 0;
  let availableFunds = 0;
  balances.forEach(b => {
    if (b.accountType === '한도약정계좌') {
      // 한도약정은 순수자금에서 제외. 가용자금에만 반영
      if (b.currentBalance >= 0) {
        availableFunds += b.currentBalance;
      } else {
        availableFunds += b.currentBalance;
      }
    } else {
      if (b.isPure) pureFunds += b.currentBalance;
      if (b.isAvailable) availableFunds += b.currentBalance;
    }
  });
  const financialFunds = balances.filter(b => b.isFinancial).reduce((s, b) => s + b.currentBalance, 0);

  // === 기초 순수자금 (실적 반영 전, 기초금액 합계 기반 — 월별 시뮬레이션 시작값 용) ===
  // pureFunds와 동일 정책: 한도약정계좌 제외, 순수자금 플래그만
  let pureFundsOpening = 0;
  balances.forEach(b => {
    if (b.accountType === '한도약정계좌') return; // 한도약정 제외
    if (b.isPure) pureFundsOpening += b.openingBalance;
  });

  // 자금구분별 집계 (한도약정계좌 제외 — 아래 한도약정 카드에서 별도 표시)
  const byFundType = {};
  balances.forEach(b => {
    if (b.accountType === '한도약정계좌') return; // 한도는 제외
    const key = b.fundType || '(미분류)';
    if (!byFundType[key]) byFundType[key] = { fundType: key, balance: 0, count: 0 };
    byFundType[key].balance += b.currentBalance;
    byFundType[key].count += 1;
  });
  // 순서 고정: 순수자금 → 가용자금 → R&D자금 → (미분류)
  const FUND_TYPE_ORDER = ['순수자금', '가용자금', 'R&D자금', '(미분류)'];
  const fundTypeList = Object.values(byFundType).sort((a, b) =>
    FUND_TYPE_ORDER.indexOf(a.fundType) - FUND_TYPE_ORDER.indexOf(b.fundType));

  // === 한도약정계좌 사용량 ===
  // 한도약정은 식스티헤르츠만 소유 — 다른 법인 선택 시에는 표시/계산 안함
  const creditAccounts = balances.filter(b => b.accountType === '한도약정계좌');
  // 별도 한도약정 (파일에 없는 항목) - 선택된 법인 기준으로 스코프
  const separateCredits = SEPARATE_CREDIT_LINES.filter(s =>
    entityFilter === 'all' || s.entity === entityFilter
  );
  const fileCreditLimitSum = creditAccounts.reduce((s, b) => s + (b.limit || 0), 0);
  const separateCreditLimitSum = separateCredits.reduce((s, c) => s + c.limit, 0);
  const creditLimitSum = fileCreditLimitSum + separateCreditLimitSum;
  const creditUsedSum = creditAccounts.filter(c => c.currentBalance < 0).reduce((s, c) => s + Math.abs(c.currentBalance), 0);
  const creditUsageRate = creditLimitSum > 0 ? (creditUsedSum / creditLimitSum) * 100 : 0;
  const creditDetail = creditAccounts.map(c => {
    const used = c.currentBalance < 0 ? Math.abs(c.currentBalance) : 0;
    const usage = c.limit > 0 ? (used / c.limit) * 100 : 0;
    const remaining = Math.max(0, (c.limit || 0) - used); // 잔여한도
    return { ...c, used, usage, remaining };
  });

  // === 실적 월별 집계 ===
  const actualMonthly = {};
  filteredTxs.forEach(t => {
    const k = t.date.slice(0, 7);
    if (!actualMonthly[k]) actualMonthly[k] = { month: k, inflow: 0, outflow: 0, net: 0 };
    actualMonthly[k].inflow += t.inflow;
    actualMonthly[k].outflow += t.outflow;
    actualMonthly[k].net += t.amount;
  });

  // === 실적 월별 (재무제표용, 한도약정계좌 거래 제외) ===
  // 재무제표 기준 넷번: 한도약정 거래는 "자금 이동"이지 실제 비용/수익이 아님
  const creditAccountNumbers = new Set(
    balances.filter(b => b.accountType === '한도약정계좌').map(b => b.number)
  );
  const actualMonthlyFinancial = {};
  filteredTxs.forEach(t => {
    if (creditAccountNumbers.has(t.accountNumber)) return; // 한도약정 입출금 제외
    const k = t.date.slice(0, 7);
    if (!actualMonthlyFinancial[k]) actualMonthlyFinancial[k] = { month: k, inflow: 0, outflow: 0, net: 0 };
    actualMonthlyFinancial[k].inflow += t.inflow;
    actualMonthlyFinancial[k].outflow += t.outflow;
    actualMonthlyFinancial[k].net += t.amount;
  });

  // === 실적 월별 (순수자금 시뮬레이션용) — 순수자금 플래그 계좌만 (한도약정 제외) ===
  // pureFundsOpening/pureFunds와 관점을 일치시킴: 한도약정은 별도 카드에서 관리
  const pureFundAccountNumbers = new Set(
    balances.filter(b => b.isPure && b.accountType !== '한도약정계좌').map(b => b.number)
  );
  const actualMonthlyPure = {};
  filteredTxs.forEach(t => {
    if (!pureFundAccountNumbers.has(t.accountNumber)) return;
    const k = t.date.slice(0, 7);
    if (!actualMonthlyPure[k]) actualMonthlyPure[k] = { month: k, inflow: 0, outflow: 0, net: 0 };
    actualMonthlyPure[k].inflow += t.inflow;
    actualMonthlyPure[k].outflow += t.outflow;
    actualMonthlyPure[k].net += t.amount;
  });

  // === 계획 월별 집계 (planTypeChoice 적용, 식스티만 확정계획 선택 가능) ===
  const planRelevant = filteredPlans.filter(p => {
    if (p.entity === '식스티헤르츠') return p.planType === planTypeChoice;
    return p.planType === '전체계획';
  });
  const planMonthly = {};
  planRelevant.forEach(p => {
    if (!p.month) return;
    if (!planMonthly[p.month]) planMonthly[p.month] = { month: p.month, inflow: 0, outflow: 0, net: 0 };
    planMonthly[p.month].inflow += p.inflow;
    planMonthly[p.month].outflow += p.outflow;
    planMonthly[p.month].net += p.amount;
  });

  // === 통합 월별 뷰 (실적 + 계획) ===
  // 각 월: actualizedMonths에 있으면 실적 데이터, 아니면 계획 데이터
  const allMonthsSet = new Set([...Object.keys(actualMonthly), ...Object.keys(planMonthly)]);
  const allMonths = [...allMonthsSet].sort();
  const mergedMonthlyBase = allMonths.map(month => {
    const hasActual = !!actualMonthly[month];
    const hasPlan = !!planMonthly[month];
    const userChecked = actualizedMonths.has(month);
    const isActualized = userChecked;
    const source = isActualized ? '실적' : '계획';
    // ⭐ 실적 월은 순수자금 관점 거래(actualMonthlyPure)를 쓴다.
    //    자금현황의 "순수자금 계"와 누적 잔액이 일치하도록 한도약정(음수) 거래만 선별 반영
    const row = isActualized
      ? (actualMonthlyPure[month] || { inflow: 0, outflow: 0, net: 0 })
      : (planMonthly[month] || { inflow: 0, outflow: 0, net: 0 });
    return {
      month,
      source,
      isActualized,
      hasActual, hasPlan,
      inflow: row.inflow || 0,
      outflow: row.outflow || 0,
      net: row.net || 0,
      // 표시용 참고값 (원래 전체 실적/계획)
      actualInflow: actualMonthly[month]?.inflow || 0,
      actualOutflow: actualMonthly[month]?.outflow || 0,
      actualNet: actualMonthly[month]?.net || 0,
      planInflow: planMonthly[month]?.inflow || 0,
      planOutflow: planMonthly[month]?.outflow || 0,
      planNet: planMonthly[month]?.net || 0,
    };
  });

  // 월별 누적 잔액 추가 (기초 순수자금부터 시작)
  let runningBalance = pureFundsOpening;
  const mergedMonthly = [
    // 기초 행 (첫 번째)
    {
      month: '기초', source: '기초', isActualized: false, isOpening: true,
      hasActual: false, hasPlan: false,
      inflow: 0, outflow: 0, net: 0,
      actualInflow: 0, actualOutflow: 0, actualNet: 0,
      planInflow: 0, planOutflow: 0, planNet: 0,
      cumulativeBalance: pureFundsOpening,
    },
    ...mergedMonthlyBase.map(row => {
      runningBalance += row.net;
      return { ...row, cumulativeBalance: runningBalance };
    }),
  ];

  // 누적 자금 변동 (실적 기준, 차트용)
  // monthlySeries는 아래에서 정의되므로 누적도 그곳 근처에서 계산

  // === 자금 구성 분해 (라벨 표시용) ===
  // R&D 자금: 자금구분 === 'R&D자금' 계좌 합계
  const rdFunds = balances.filter(b => b.fundType === 'R&D자금').reduce((s, b) => s + b.currentBalance, 0);
  // 한도약정 잔액 합계 (양수=보통예금, 음수=사용중)
  const creditBalanceSum = balances.filter(b => b.accountType === '한도약정계좌').reduce((s, b) => s + b.currentBalance, 0);

  // === 가용자금 (표시용): 순수자금 + 한도약정 잔액 + 총 한도 = 실제 쓸 수 있는 총액 ===
  // 기존 availableFunds(Y플래그)에 총 한도를 더한 값과 동일
  const availableForRunway = availableFunds + creditLimitSum;

  // === 3가지 기준 Burn & Runway 계산 헬퍼 ===
  // monthlyRows: 일반(순수/가용) 넷번 계산용
  // financialMonthlyRows: 재무제표 넷번 계산용 (한도약정 입출금 제외)
  const computeRunway = (monthlyRows, financialMonthlyRows) => {
    const valid = monthlyRows.filter(m => m && (m.hasActual || m.hasPlan || m.net != null));
    const avgNet = valid.length ? valid.reduce((s, m) => s + (m.net || 0), 0) / valid.length : 0;
    const burn = avgNet < 0 ? -avgNet : 0;

    // 재무제표 전용 넷번 (fallback: monthlyRows 동일)
    const finRows = (financialMonthlyRows || monthlyRows).filter(m => m && (m.hasActual || m.hasPlan || m.net != null));
    const finAvgNet = finRows.length ? finRows.reduce((s, m) => s + (m.net || 0), 0) / finRows.length : 0;
    const financialBurn = finAvgNet < 0 ? -finAvgNet : 0;

    return {
      burn,
      financialBurn,
      monthCount: valid.length,
      financialMonthCount: finRows.length,
      pureRunway: burn > 0 ? pureFunds / burn : Infinity,
      availableRunway: burn > 0 ? availableForRunway / burn : Infinity,
      financialRunway: financialBurn > 0 ? financialFunds / financialBurn : Infinity,
    };
  };

  // 실적 기준 월별 series (차트용)
  // 자금 변동 추이 차트용: 순수자금 관점 월별 집계
  // (actualMonthly는 한도약정 포함 전체 → cumulativeSeries 시작값과 불일치)
  const monthlySeries = Object.values(actualMonthlyPure).sort((a, b) => a.month.localeCompare(b.month));
  const monthlySeriesFinancial = Object.values(actualMonthlyFinancial).sort((a, b) => a.month.localeCompare(b.month));
  // 넷번 계산용은 전체 실적(한도약정 포함) 그대로 필요 - 평균 계산 목적
  const monthlySeriesAll = Object.values(actualMonthly).sort((a, b) => a.month.localeCompare(b.month));

  // 누적 자금 변동 (순수자금 관점) - 기초 순수자금부터 시작 → 현재 순수자금과 일치
  let cum = pureFundsOpening;
  const cumulativeSeries = [
    // 맨 앞에 "기초" 행 추가
    { month: '기초', net: 0, cumulative: pureFundsOpening, isOpening: true },
    ...monthlySeries.map(m => {
      cum += m.net;
      return { month: m.month, net: m.net, cumulative: cum };
    }),
  ];

  // 1) 실적 기준: 체크된 월만 (또는 체크 없으면 모든 실적 월)
  // 넷번 평균 계산은 전체 실적 기준이 의미 있음 (한도약정은 평균 넷번에 중요)
  const actualBurnRows = useMonthFilter
    ? monthlySeriesAll.filter(m => actualizedMonths.has(m.month))
    : monthlySeriesAll;
  const actualBurnRowsFinancial = useMonthFilter
    ? monthlySeriesFinancial.filter(m => actualizedMonths.has(m.month))
    : monthlySeriesFinancial;
  const actualBurnResult = computeRunway(actualBurnRows, actualBurnRowsFinancial);

  // === 계획 기준 런웨이 월별 데이터 빌더 ===
  // 체크된 월 = 실적, 나머지 = 계획 (planType에 따라 전체/확정)
  // 연도 필터 적용
  // useFinancialActual: 재무제표 전용 여부 (실적월에서 한도약정 거래 제외)
  // ⭐ 순수자금 관점: 실적 월은 actualMonthlyPure (순수자금 계좌만)를 기본 사용
  //   → 자금현황의 "순수자금 계"와 월별 누적 잔액이 일치
  // ⭐ 연도 필터: planYearFilter가 '2026'이면 실적/계획 모두 2026년 월만 포함
  //   → 전체계획이 2027년까지 있어도 2026년 평균만 계산되어 넷번이 정확
  const buildMergedRunwayRows = (planMonthsAgg, useFinancialActual = false) => {
    const actualSource = useFinancialActual ? actualMonthlyFinancial : actualMonthlyPure;
    const relevantMonths = new Set();
    // 계획 월도 연도 필터 명시적 적용 (상위에서 필터링 했지만 안전장치)
    Object.keys(planMonthsAgg).forEach(m => {
      if (planYearFilter === 'all' || m.startsWith(planYearFilter)) relevantMonths.add(m);
    });
    // 실적 월 연도 필터 적용
    Object.keys(actualSource).forEach(m => {
      if (planYearFilter === 'all' || m.startsWith(planYearFilter)) relevantMonths.add(m);
    });
    return [...relevantMonths].sort().map(month => {
      const userChecked = actualizedMonths.has(month);
      const actualData = actualSource[month];
      const planData = planMonthsAgg[month];
      if (userChecked && actualData) return { month, net: actualData.net, inflow: actualData.inflow, outflow: actualData.outflow, source: '실적', hasActual: true };
      if (planData) return { month, net: planData.net, inflow: planData.inflow, outflow: planData.outflow, source: '계획', hasPlan: true };
      if (actualData) return { month, net: actualData.net, inflow: actualData.inflow, outflow: actualData.outflow, source: '실적', hasActual: true };
      return null;
    }).filter(Boolean);
  };

  // 2) 전체계획 기준 넷번/런웨이 (연도 필터 + 실적+계획 병합)
  const allPlanRelevant = filteredPlans.filter(p => {
    if (p.planType !== '전체계획') return false;
    if (planYearFilter !== 'all' && !(p.month || '').startsWith(planYearFilter)) return false;
    return true;
  });
  const allPlanMonthlyAgg = {};
  allPlanRelevant.forEach(p => {
    if (!p.month) return;
    if (!allPlanMonthlyAgg[p.month]) allPlanMonthlyAgg[p.month] = { month: p.month, inflow: 0, outflow: 0, net: 0, hasPlan: true };
    allPlanMonthlyAgg[p.month].inflow += p.inflow;
    allPlanMonthlyAgg[p.month].outflow += p.outflow;
    allPlanMonthlyAgg[p.month].net += p.amount;
  });
  const allPlanMergedRows = buildMergedRunwayRows(allPlanMonthlyAgg, false);
  const allPlanMergedRowsFinancial = buildMergedRunwayRows(allPlanMonthlyAgg, true);
  const allPlanBurnResult = computeRunway(allPlanMergedRows, allPlanMergedRowsFinancial);

  // 3) 확정계획 기준 넷번/런웨이 (식스티만 · 연도 필터 + 실적+계획 병합)
  const confirmedPlanRelevant = filteredPlans.filter(p => {
    if (p.planType !== '확정계획') return false;
    if (p.entity !== '식스티헤르츠') return false;
    if (planYearFilter !== 'all' && !(p.month || '').startsWith(planYearFilter)) return false;
    return true;
  });
  const confirmedPlanMonthlyAgg = {};
  confirmedPlanRelevant.forEach(p => {
    if (!p.month) return;
    if (!confirmedPlanMonthlyAgg[p.month]) confirmedPlanMonthlyAgg[p.month] = { month: p.month, inflow: 0, outflow: 0, net: 0, hasPlan: true };
    confirmedPlanMonthlyAgg[p.month].inflow += p.inflow;
    confirmedPlanMonthlyAgg[p.month].outflow += p.outflow;
    confirmedPlanMonthlyAgg[p.month].net += p.amount;
  });
  const confirmedPlanMergedRows = buildMergedRunwayRows(confirmedPlanMonthlyAgg, false);
  const confirmedPlanMergedRowsFinancial = buildMergedRunwayRows(confirmedPlanMonthlyAgg, true);
  const confirmedPlanBurnResult = computeRunway(confirmedPlanMergedRows, confirmedPlanMergedRowsFinancial);
  // 식스티 외 법인을 선택했고 그 법인에 확정계획 없으면 숨김
  const confirmedPlanAvailable = Object.keys(confirmedPlanMonthlyAgg).length > 0;

  // === 월별 누적 잔액 시리즈 (계획 런웨이 섹션용, 시작값 = 현재 순수자금) ===
  // 각 월마다: inflow / outflow / net / 누적 잔액 (시작: 현재 순수자금)
  const buildBalanceSeries = (mergedRows, startBalance) => {
    let running = startBalance;
    return mergedRows.map(row => {
      const prevBalance = running;
      running += row.net;
      return {
        month: row.month,
        source: row.source,
        inflow: row.inflow || 0,
        outflow: row.outflow || 0,
        net: row.net || 0,
        startBalance: prevBalance,
        endBalance: running,
      };
    });
  };
  const allPlanBalanceSeries = buildBalanceSeries(allPlanMergedRows, pureFundsOpening);
  const confirmedPlanBalanceSeries = buildBalanceSeries(confirmedPlanMergedRows, pureFundsOpening);
  // 첫 번째 (-) 진입 월 찾기
  const findNegativeMonth = (series) => series.find(r => r.endBalance < 0)?.month || null;
  const allPlanNegativeMonth = findNegativeMonth(allPlanBalanceSeries);
  const confirmedPlanNegativeMonth = findNegativeMonth(confirmedPlanBalanceSeries);

  // 메인에 쓸 넷번/런웨이 = 실적 기준
  const netBurn = actualBurnResult.burn;
  const pureRunway = actualBurnResult.pureRunway;
  const availableRunway = actualBurnResult.availableRunway;
  const financialRunway = actualBurnResult.financialRunway;

  // 법인별 순수자금
  const entities = [...new Set(accounts.map(a => a.entity))].filter(Boolean);
  const byEntity = entities.map(entName => {
    const accs = balances.filter(b => b.entity === entName);
    let pure = 0, avail = 0;
    accs.forEach(b => {
      if (b.accountType === '한도약정계좌') {
        if (b.currentBalance >= 0) { pure += b.currentBalance; avail += b.currentBalance; }
        else { avail += b.currentBalance; }
      } else {
        if (b.isPure) pure += b.currentBalance;
        if (b.isAvailable) avail += b.currentBalance;
      }
    });
    return { name: entName, pureFunds: pure, availableFunds: avail, accountCount: accs.length };
  }).filter(e => e.accountCount > 0).sort((a, b) => b.pureFunds - a.pureFunds);

  // === 주요 지출 분류 (자금이동 제외) ===
  const expenseTotals = {};
  filteredTxs.forEach(t => {
    if (t.outflow <= 0) return;
    const cat = t.category || '(미분류)';
    if (cat === '자금이동') return;
    expenseTotals[cat] = (expenseTotals[cat] || 0) + t.outflow;
  });
  const topExpenseCategories = Object.entries(expenseTotals).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);

  // === 주요 입금 분류 (자금이동 제외) ===
  const incomeTotals = {};
  filteredTxs.forEach(t => {
    if (t.inflow <= 0) return;
    const cat = t.category || '(미분류)';
    if (cat === '자금이동') return;
    incomeTotals[cat] = (incomeTotals[cat] || 0) + t.inflow;
  });
  const topIncomeCategories = Object.entries(incomeTotals).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);

  // 계획 토글 가능 여부
  const planToggleAvailable = entityFilter === 'all' || entityFilter === '식스티헤르츠';

  return {
    filteredAccounts: balances, filteredTransactions: filteredTxs, filteredPlans,
    pureFunds, availableFunds, financialFunds, availableForRunway,
    pureFundsOpening,
    rdFunds, creditBalanceSum,
    fundTypeList,
    creditAccounts: creditDetail, separateCredits,
    creditLimitSum, fileCreditLimitSum, separateCreditLimitSum, creditUsedSum, creditUsageRate,
    monthlySeries, cumulativeSeries, mergedMonthly, allMonths,
    // 실적 기준 (메인)
    netBurn, pureRunway, availableRunway, financialRunway,
    actualBurnResult, allPlanBurnResult, confirmedPlanBurnResult,
    confirmedPlanAvailable,
    // 월별 누적 잔액 차트용
    allPlanBalanceSeries, confirmedPlanBalanceSeries,
    allPlanNegativeMonth, confirmedPlanNegativeMonth,
    planTypeChoice, planToggleAvailable,
    planYears, planYearFilter,
    byEntity, topExpenseCategories, topIncomeCategories,
    allEntities: entities,
    burnBaseMonthCount: actualBurnResult.monthCount,
    cutoffLabel, useMonthFilter,
  };
}

// ============================================================================
//  RAW TABLE — displays uploaded columns as-is + optional extra computed columns
// ============================================================================
function RawTable({ headers, rows, extraColumns = [], maxHeight = 560, colSpan, rowStyle }) {
  const totalCols = headers.length + extraColumns.length;
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState('asc'); // 'asc' | 'desc'

  const handleSort = (key) => {
    if (sortKey === key) {
      // 같은 컬럼 클릭: asc → desc → 해제
      if (sortDir === 'asc') setSortDir('desc');
      else { setSortKey(null); setSortDir('asc'); }
    } else {
      setSortKey(key); setSortDir('asc');
    }
  };

  // 정렬된 행
  const sortedRows = useMemo(() => {
    if (!sortKey) return rows;
    const parseNum = (v) => {
      if (v == null) return null;
      const cleaned = String(v).replace(/[,\s₩\$]/g, '').replace(/%/g, '');
      const n = parseFloat(cleaned);
      return isNaN(n) ? null : n;
    };
    const arr = [...rows];
    arr.sort((a, b) => {
      // extra column 여부
      const extraCol = extraColumns.find(c => c.key === sortKey);
      let va, vb;
      if (extraCol) {
        // extra column은 render 결과 기반 숫자 비교 (sortValue가 있으면 쓰고, 없으면 원본)
        va = extraCol.sortValue ? extraCol.sortValue(a) : extraCol.render(a);
        vb = extraCol.sortValue ? extraCol.sortValue(b) : extraCol.render(b);
      } else {
        va = a._raw?.[sortKey] ?? '';
        vb = b._raw?.[sortKey] ?? '';
      }
      // 숫자 시도
      const na = parseNum(va);
      const nb = parseNum(vb);
      let cmp;
      if (na != null && nb != null) {
        cmp = na - nb;
      } else {
        cmp = String(va).localeCompare(String(vb), 'ko');
      }
      return sortDir === 'asc' ? cmp : -cmp;
    });
    return arr;
  }, [rows, sortKey, sortDir, extraColumns]);

  const SortIcon = ({ active, dir }) => {
    if (!active) return <span style={{ color: COLOR.textMute, fontSize: 9, marginLeft: 4, opacity: 0.5 }}>⇅</span>;
    return <span style={{ color: COLOR.gold, fontSize: 10, marginLeft: 4 }}>{dir === 'asc' ? '▲' : '▼'}</span>;
  };

  return (
    <div className="overflow-x-auto" style={{ maxHeight, overflowY: 'auto' }}>
      <table className="w-full text-sm">
        <thead style={{ position: 'sticky', top: 0, zIndex: 10, background: COLOR.surfaceEl }}>
          <tr>
            {headers.map(h => (
              <th key={h} onClick={() => handleSort(h)}
                  className="px-3 py-3 text-left text-xs font-medium whitespace-nowrap select-none"
                  style={{ color: sortKey === h ? COLOR.text : COLOR.textMute, letterSpacing: '0.04em', cursor: 'pointer', userSelect: 'none' }}>
                {h}<SortIcon active={sortKey === h} dir={sortDir} />
              </th>
            ))}
            {extraColumns.map(c => (
              <th key={c.key} onClick={() => handleSort(c.key)}
                  className="px-3 py-3 text-left text-xs font-medium whitespace-nowrap select-none"
                  style={{ color: COLOR.gold, letterSpacing: '0.04em', cursor: 'pointer', userSelect: 'none' }}>
                {c.header} ✦<SortIcon active={sortKey === c.key} dir={sortDir} />
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sortedRows.map((row, i) => {
            const customStyle = rowStyle ? rowStyle(row) : null;
            return (
            <tr key={row.id || i} style={{ borderTop: `1px solid ${COLOR.border}`, ...(customStyle || {}) }}>
              {headers.map(h => {
                const v = row._raw?.[h] ?? '';
                const numeric = looksNumeric(v);
                const displayValue = numeric ? formatTableNumber(v) : v;
                return (
                  <td key={h}
                      className={`px-3 py-2.5 ${numeric ? 'whitespace-nowrap text-right tabular-nums' : ''}`}
                      style={{ color: COLOR.text, fontFamily: numeric ? 'var(--mono)' : 'inherit', fontSize: numeric ? '12px' : '13px' }}>
                    {displayValue}
                  </td>
                );
              })}
              {extraColumns.map(c => (
                <td key={c.key} className="px-3 py-2.5"
                    style={{ color: c.color?.(row) || COLOR.gold, fontFamily: 'var(--mono)', fontSize: '12px', whiteSpace: 'nowrap', textAlign: c.align || 'right' }}>
                  {c.render(row)}
                </td>
              ))}
            </tr>
            );
          })}
          {sortedRows.length === 0 && (
            <tr><td colSpan={colSpan || totalCols || 1} className="px-4 py-8 text-center" style={{ color: COLOR.textMute }}>데이터가 없습니다.</td></tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

function MonthlyBalanceChart({ series, negativeMonth, accentColor, titleLabel }) {
  if (!series || series.length === 0) {
    return (
      <div className="text-xs px-3 py-4 text-center rounded-lg" style={{ color: COLOR.textMute, background: COLOR.surfaceEl, border: `1px dashed ${COLOR.border}` }}>
        표시할 월별 데이터가 없습니다.
      </div>
    );
  }

  const startBalance = series[0]?.startBalance || 0;
  const endBalance = series[series.length - 1]?.endBalance || 0;
  const totalInflow = series.reduce((s, r) => s + r.inflow, 0);
  const totalOutflow = series.reduce((s, r) => s + r.outflow, 0);

  return (
    <div className="rounded-xl overflow-hidden" style={{ background: COLOR.surface, border: `1px solid ${COLOR.border}` }}>
      <div className="px-4 py-3 flex items-center justify-between flex-wrap gap-2" style={{ borderBottom: `1px solid ${COLOR.border}` }}>
        <div>
          <div className="text-xs font-medium" style={{ color: COLOR.text }}>{titleLabel}</div>
          <div className="text-[11px] mt-0.5" style={{ color: COLOR.textMute }}>
            기초 {formatCompactKRW(startBalance)} + 입금 {formatCompactKRW(totalInflow)} − 출금 {formatCompactKRW(totalOutflow)} = 기말 {formatCompactKRW(endBalance)}
          </div>
        </div>
        {negativeMonth ? (
          <div className="text-[11px] px-2.5 py-1 rounded-md flex items-center gap-1.5"
               style={{ color: COLOR.danger, background: `${COLOR.danger}10`, border: `1px solid ${COLOR.danger}35` }}>
            <AlertCircle size={11} />
            <span>잔액 (-) 진입: <b style={{ fontFamily: 'var(--mono)' }}>{negativeMonth}</b></span>
          </div>
        ) : (
          <div className="text-[11px] px-2.5 py-1 rounded-md flex items-center gap-1.5"
               style={{ color: COLOR.success, background: `${COLOR.success}10`, border: `1px solid ${COLOR.success}35` }}>
            <CheckCircle2 size={11} />
            <span>전체 기간 잔액 (+) 유지</span>
          </div>
        )}
      </div>

      <div className="overflow-x-auto" style={{ maxHeight: 420, overflowY: 'auto' }}>
        <table className="w-full text-xs">
          <thead style={{ position: 'sticky', top: 0, background: COLOR.surfaceEl, zIndex: 1 }}>
            <tr>
              <th className="px-3 py-2.5 text-left" style={{ color: COLOR.textMute, fontWeight: 500, borderBottom: `1px solid ${COLOR.border}` }}>월</th>
              <th className="px-3 py-2.5 text-left" style={{ color: COLOR.textMute, fontWeight: 500, borderBottom: `1px solid ${COLOR.border}` }}>구분</th>
              <th className="px-3 py-2.5 text-right" style={{ color: COLOR.textMute, fontWeight: 500, borderBottom: `1px solid ${COLOR.border}` }}>입금계</th>
              <th className="px-3 py-2.5 text-right" style={{ color: COLOR.textMute, fontWeight: 500, borderBottom: `1px solid ${COLOR.border}` }}>출금계</th>
              <th className="px-3 py-2.5 text-right" style={{ color: COLOR.textMute, fontWeight: 500, borderBottom: `1px solid ${COLOR.border}` }}>순증감</th>
              <th className="px-3 py-2.5 text-right" style={{ color: COLOR.textMute, fontWeight: 500, borderBottom: `1px solid ${COLOR.border}` }}>월말 잔액</th>
            </tr>
          </thead>
          <tbody>
            {/* 기초 행 */}
            <tr style={{ background: COLOR.bg }}>
              <td className="px-3 py-2" style={{ color: COLOR.textDim, fontFamily: 'var(--mono)', fontStyle: 'italic' }}>기초</td>
              <td className="px-3 py-2" style={{ color: COLOR.textMute, fontSize: 10 }}>시작값</td>
              <td className="px-3 py-2 text-right" style={{ color: COLOR.textMute }}>—</td>
              <td className="px-3 py-2 text-right" style={{ color: COLOR.textMute }}>—</td>

                  style={{ fontFamily: 'var(--mono)', color: startBalance >= 0 ? COLOR.text : COLOR.danger }}>
                {formatCompactKRW(startBalance)}
              </td>
            </tr>
            {series.map((r, i) => {
              const isNeg = r.endBalance < 0;
              const isFirstNeg = negativeMonth && r.month === negativeMonth;
              return (
                <tr key={i} style={{
                  borderTop: `1px solid ${COLOR.border}`,
                  background: isFirstNeg ? `${COLOR.danger}14` : (isNeg ? `${COLOR.danger}08` : 'transparent'),
                }}>
                  <td className="px-3 py-2 font-medium" style={{ color: COLOR.text, fontFamily: 'var(--mono)' }}>
                    {r.month}
                    {isFirstNeg && <span className="ml-1.5 text-[9px] px-1 py-0.5 rounded" style={{ color: COLOR.danger, background: `${COLOR.danger}20` }}>(-) 시작</span>}
                  </td>
                  <td className="px-3 py-2">
                    <span className="text-[10px] px-1.5 py-0.5 rounded"
                          style={{
                            color: r.source === '실적' ? COLOR.success : COLOR.info,
                            background: r.source === '실적' ? `${COLOR.success}15` : `${COLOR.info}15`,
                          }}>{r.source}</span>
                  </td>
                  <td className="px-3 py-2 text-right tabular-nums" style={{ fontFamily: 'var(--mono)', color: r.inflow > 0 ? COLOR.success : COLOR.textMute }}>

                  </td>
                  <td className="px-3 py-2 text-right tabular-nums" style={{ fontFamily: 'var(--mono)', color: r.outflow > 0 ? COLOR.danger : COLOR.textMute }}>
                    {r.outflow > 0 ? formatCompactKRW(r.outflow) : '—'}
                  </td>
                  <td className="px-3 py-2 text-right tabular-nums font-medium"
                      style={{ fontFamily: 'var(--mono)', color: r.net >= 0 ? COLOR.success : COLOR.danger }}>
                    {formatCompactKRW(r.net)}
                  </td>
                  <td className="px-3 py-2 text-right tabular-nums font-semibold"
                      style={{ fontFamily: 'var(--mono)', color: isNeg ? COLOR.danger : COLOR.text }}>
                    {formatCompactKRW(r.endBalance)}
                  </td>
                </tr>
              );
            })}
          </tbody>
          <tfoot style={{ background: COLOR.surfaceEl }}>
            <tr>
              <td className="px-3 py-2.5 font-semibold" style={{ color: COLOR.text, borderTop: `2px solid ${COLOR.border}` }}>합계</td>
              <td className="px-3 py-2.5" style={{ borderTop: `2px solid ${COLOR.border}` }}></td>
              <td className="px-3 py-2.5 text-right tabular-nums font-semibold" style={{ fontFamily: 'var(--mono)', color: COLOR.success, borderTop: `2px solid ${COLOR.border}` }}>
                {formatCompactKRW(totalInflow)}
              </td>
              <td className="px-3 py-2.5 text-right tabular-nums font-semibold" style={{ fontFamily: 'var(--mono)', color: COLOR.danger, borderTop: `2px solid ${COLOR.border}` }}>
                {formatCompactKRW(totalOutflow)}
              </td>
              <td className="px-3 py-2.5 text-right tabular-nums font-semibold" style={{ fontFamily: 'var(--mono)', color: (totalInflow - totalOutflow) >= 0 ? COLOR.success : COLOR.danger, borderTop: `2px solid ${COLOR.border}` }}>
                {formatCompactKRW(totalInflow - totalOutflow)}
              </td>
              <td className="px-3 py-2.5 text-right tabular-nums font-semibold" style={{ fontFamily: 'var(--mono)', color: endBalance >= 0 ? accentColor : COLOR.danger, borderTop: `2px solid ${COLOR.border}` }}>
                {formatCompactKRW(endBalance)}
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

function AccountsView({ metrics, teamSettings, cutoffOverride, setCutoffOverride, historicalCutoffOptions }) {
  const [search, setSearch] = useState('');
  const [accountTypeFilter, setAccountTypeFilter] = useState('all');
  const [fundTypeFilter, setFundTypeFilter] = useState('all');

  const accountTypeOptions = useMemo(() => {
    const types = new Set(metrics.filteredAccounts.map(a => a.accountType).filter(Boolean));
    return [{ value: 'all', label: '전체 계좌구분' }, ...Array.from(types).sort().map(t => ({ value: t, label: t }))];
  }, [metrics.filteredAccounts]);
  const fundTypeOptions = useMemo(() => {
    const types = new Set(metrics.filteredAccounts.map(a => a.fundType).filter(Boolean));
    return [{ value: 'all', label: '전체 자금구분' }, ...Array.from(types).sort().map(t => ({ value: t, label: t }))];
  }, [metrics.filteredAccounts]);

  const filtered = useMemo(() => {
    // 한도약정계좌는 잔액이 +일 때만 포함 (-는 한도현황 섹션에서 별도 확인)
    let list = metrics.filteredAccounts.filter(a =>
      !(a.accountType === '한도약정계좌' && a.currentBalance < 0)
    );
    if (accountTypeFilter !== 'all') list = list.filter(a => a.accountType === accountTypeFilter);
    if (fundTypeFilter !== 'all') list = list.filter(a => a.fundType === fundTypeFilter);
    if (search) {
      const s = search.toLowerCase();
      list = list.filter(a => Object.values(a._raw || {}).some(v => String(v || '').toLowerCase().includes(s)));
    }
    return list;
  }, [metrics.filteredAccounts, search, accountTypeFilter, fundTypeFilter]);

  // 제외된 (-) 한도약정 계좌 개수 (안내용)
  const excludedCreditCount = metrics.filteredAccounts.filter(a =>
    a.accountType === '한도약정계좌' && a.currentBalance < 0
  ).length;

  const resetFilters = () => { setSearch(''); setAccountTypeFilter('all'); setFundTypeFilter('all'); };
  const headers = filtered[0]?._headers || metrics.filteredAccounts[0]?._headers || [];

  const handleExport = () => {
    const allCols = [...headers, '입금계', '출금계', '현재잔액'];
    const rowsForExport = filtered.map(a => ({
      ...a._raw,
      '입금계': a.inflowSum,
      '출금계': a.outflowSum,
      '현재잔액': a.currentBalance,
    }));
    exportCSV(`계좌현황_${new Date().toISOString().slice(0,10)}.csv`, rowsForExport, allCols);
  };

  const extraColumns = [
    { key: 'inflowSum', header: '입금계',
      render: row => formatKRW(row.inflowSum),
      color: row => COLOR.success },
    { key: 'outflowSum', header: '출금계',
      render: row => formatKRW(row.outflowSum),
      color: row => COLOR.danger },
    { key: 'currentBalance', header: '현재잔액',
      render: row => formatKRW(row.currentBalance),
      color: row => row.currentBalance >= 0 ? COLOR.text : COLOR.danger },
  ];

  const totalBalance = filtered.reduce((s, a) => s + a.currentBalance, 0);
  const totalOpening = filtered.reduce((s, a) => s + a.openingBalance, 0);
  const totalInflow = filtered.reduce((s, a) => s + a.inflowSum, 0);
  const totalOutflow = filtered.reduce((s, a) => s + a.outflowSum, 0);

  return (
    <div className="space-y-4">
      {/* 마감기준월 강조 배너 + 시점 여행 드롭다운 */}
      <div className="rounded-xl p-4 flex items-center justify-between flex-wrap gap-3"
           style={{
             background: cutoffOverride
               ? `linear-gradient(135deg, ${COLOR.purple}14 0%, ${COLOR.purple}08 100%)`
               : `linear-gradient(135deg, ${COLOR.gold}14 0%, ${COLOR.gold}08 100%)`,
             border: `1.5px solid ${cutoffOverride ? COLOR.purple + '55' : COLOR.gold + '55'}`
           }}>
        <div className="flex items-center gap-3 flex-wrap">
          <div className="rounded-lg p-2.5 flex items-center justify-center"
               style={{ background: `${cutoffOverride ? COLOR.purple : COLOR.gold}22`,
                        color: cutoffOverride ? COLOR.purple : COLOR.gold }}>
            <CalendarIcon size={20} />
          </div>
          <div>
            <div className="text-[11px] font-medium mb-0.5" style={{ color: COLOR.textMute, letterSpacing: '0.08em', textTransform: 'uppercase' }}>
              {cutoffOverride ? '⏮ 과거 시점 잔액 조회' : '계좌 잔액 기준'}
            </div>
            <div className="text-xl font-bold tabular-nums" style={{ color: COLOR.text, fontFamily: 'var(--mono)', letterSpacing: '-0.01em' }}>
              마감기준월 : <span style={{ color: cutoffOverride ? COLOR.purple : COLOR.gold }}>{cutoffOverride || teamSettings?.closingMonth || '—'}</span>
            </div>
            {cutoffOverride && teamSettings?.closingMonth && (
              <div className="text-[11px] mt-0.5" style={{ color: COLOR.textDim }}>
                ⚠ 현재 팀 마감({teamSettings.closingMonth})이 아닌 <b>{cutoffOverride}</b> 시점의 계좌 잔액
              </div>
            )}
            {excludedCreditCount > 0 && (
              <div className="text-[11px] mt-1" style={{ color: COLOR.textDim }}>
                한도 사용중 계좌 {excludedCreditCount}개는 한도현황에서 별도 확인
              </div>
            )}
          </div>
        </div>
        {/* 시점 여행 드롭다운 */}
        {historicalCutoffOptions && historicalCutoffOptions.length > 1 && (
          <div className="flex items-center gap-2">
            <div className="text-[11px]" style={{ color: COLOR.textMute }}>시점 이동:</div>
            <Select
              value={cutoffOverride || teamSettings?.closingMonth || ''}
              onChange={(v) => {
                if (v === (teamSettings?.closingMonth || '')) setCutoffOverride(null);
                else setCutoffOverride(v);
              }}
              options={historicalCutoffOptions.map(m => ({
                value: m,
                label: m === teamSettings?.closingMonth ? `${m} (팀 마감)` : m
              }))}
              width={180}
            />
            {cutoffOverride && (
              <button onClick={() => setCutoffOverride(null)}
                      className="text-[11px] px-3 py-1.5 rounded-md font-medium"
                      style={{ background: COLOR.gold, color: '#fff', border: 'none', cursor: 'pointer' }}>
                현재로 돌아가기
              </button>
            )}
          </div>
        )}
      </div>

      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        <KPICard label="기초금액" value={formatCompactKRW(totalOpening)} subValue={`계좌 ${filtered.length}개`} icon={Activity} accent={COLOR.info} />
        <KPICard label="입금계" value={formatCompactKRW(totalInflow)} subValue="실적 마감분" icon={TrendingUp} accent={COLOR.success} />
        <KPICard label="출금계" value={formatCompactKRW(totalOutflow)} subValue="실적 마감분" icon={TrendingDown} accent={COLOR.danger} />
        <KPICard label="순증감" value={formatCompactKRW(totalInflow - totalOutflow)}
                 subValue={(totalInflow - totalOutflow) >= 0 ? '입금 > 출금' : '출금 > 입금'}
                 icon={Activity}
                 accent={(totalInflow - totalOutflow) >= 0 ? COLOR.success : COLOR.danger} />
        <KPICard label="현재잔액" value={formatCompactKRW(totalBalance)}
                 subValue="기초 + 입금 - 출금"
                 icon={Wallet} accent={totalBalance >= 0 ? COLOR.gold : COLOR.danger} />
      </div>

      <Card className="overflow-hidden">
        <div className="px-5 py-3 flex items-center gap-2 flex-wrap" style={{ background: COLOR.bg, borderBottom: `1px solid ${COLOR.border}` }}>
          <FilterIcon size={12} style={{ color: COLOR.textMute }} />
          <Select value={accountTypeFilter} onChange={setAccountTypeFilter} options={accountTypeOptions} width={150} />
          <Select value={fundTypeFilter} onChange={setFundTypeFilter} options={fundTypeOptions} width={140} />
          <TextInput value={search} onChange={setSearch} placeholder="모든 컬럼에서 검색" icon={Search} width={200} />
          <div className="ml-auto flex items-center gap-2">
            <ResetFiltersButton onClick={resetFilters} />
            <DownloadButton onClick={handleExport} />
          </div>
        </div>
        <RawTable headers={headers} rows={filtered} extraColumns={extraColumns}
          rowStyle={(row) => {
            const usage = String(row._raw?.['계좌성격'] || row._raw?.['계좌용도'] || '').trim();
            if (usage === '운영비_주거래') {
              return {
                background: `${COLOR.gold}0f`,
                borderLeft: `3px solid ${COLOR.gold}`,
              };
            }
            return null;
          }}
        />
      </Card>
    </div>
  );
}

function TransactionsView({ metrics }) {

  const [categoryFilter, setCategoryFilter] = useState('all');
  const [accountFilter, setAccountFilter] = useState('all');
  const [counterpartFilter, setCounterpartFilter] = useState('all');
  const [minAmount, setMinAmount] = useState('');
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate] = useState('');
  const [sortOrder, setSortOrder] = useState('desc'); // 'desc' = 최근순, 'asc' = 과거순
  // 한도약정계좌 포함 여부: 'all' (모두) | 'exclude' (제외) | 'only' (한도약정만)
  const [creditMode, setCreditMode] = useState('all');

  // 한도약정 계좌 번호 집합
  const creditAccountNumbers = useMemo(() => new Set(
    metrics.filteredAccounts.filter(a => a.accountType === '한도약정계좌').map(a => a.number)
  ), [metrics.filteredAccounts]);
  const hasCreditAccounts = creditAccountNumbers.size > 0;

  const categoryOptions = useMemo(() => {
    const cats = new Set(metrics.filteredTransactions.map(t => t.category).filter(Boolean));
    return [{ value: 'all', label: '전체 분류' }, ...Array.from(cats).sort().map(c => ({ value: c, label: c }))];
  }, [metrics.filteredTransactions]);
  // 계좌번호 → 계좌용도 매핑 (라벨 표시용)
  const accountUsageMap = useMemo(() => {
    const m = {};
    metrics.filteredAccounts.forEach(a => {
      m[a.number] = a.usage || '';
    });
    return m;
  }, [metrics.filteredAccounts]);

  const accountOptions = useMemo(() => {
    const accs = new Set(metrics.filteredTransactions.map(t => t.accountNumber).filter(Boolean));
    return [{ value: 'all', label: '전체 계좌' }, ...Array.from(accs).sort().map(a => {
      const usage = accountUsageMap[a];
      return { value: a, label: usage ? `${a} · ${usage}` : a };
    })];
  }, [metrics.filteredTransactions, accountUsageMap]);
  const counterpartOptions = useMemo(() => {
    const ctrs = new Set(metrics.filteredTransactions.map(t => t.counterpart).filter(Boolean));
    return [{ value: 'all', label: '전체 거래처' }, ...Array.from(ctrs).sort().map(c => ({ value: c, label: c }))];
  }, [metrics.filteredTransactions]);

  // 필터링된 거래
  const filtered = useMemo(() => {
    let list = [...metrics.filteredTransactions];
    // 한도약정계좌 필터
    if (creditMode === 'exclude') list = list.filter(t => !creditAccountNumbers.has(t.accountNumber));
    if (creditMode === 'only') list = list.filter(t => creditAccountNumbers.has(t.accountNumber));
    if (typeFilter === 'in') list = list.filter(t => t.inflow > 0);
    if (typeFilter === 'out') list = list.filter(t => t.outflow > 0);
    if (categoryFilter !== 'all') list = list.filter(t => t.category === categoryFilter);
    if (accountFilter !== 'all') list = list.filter(t => t.accountNumber === accountFilter);
    if (counterpartFilter !== 'all') list = list.filter(t => t.counterpart === counterpartFilter);
    if (startDate) list = list.filter(t => t.date >= startDate);
    if (endDate) list = list.filter(t => t.date <= endDate);
    const minAmt = parseFloat((minAmount || '').replace(/[,\s]/g, ''));
    if (!isNaN(minAmt) && minAmt > 0) {
      list = list.filter(t => Math.max(t.inflow, t.outflow) >= minAmt);
    }
    if (search) {
      const s = search.toLowerCase();
      list = list.filter(t => Object.values(t._raw || {}).some(v => String(v || '').toLowerCase().includes(s)));
    }
    return list;
  }, [metrics.filteredTransactions, search, typeFilter, categoryFilter, accountFilter, counterpartFilter, minAmount, startDate, endDate, creditMode, creditAccountNumbers]);

  // 거래일 기준 오름차순 정렬 후 누적 잔액 계산 (항상 과거부터 누적)
  const withBalance = useMemo(() => {
    const asc = [...filtered].sort((a, b) => a.date.localeCompare(b.date));
    let openingSum = 0;
    if (accountFilter !== 'all') {
      const acc = metrics.filteredAccounts.find(a => a.number === accountFilter);
      openingSum = acc?.openingBalance || 0;
    } else {
      // 계좌 필터 없음: 현재 creditMode에 따라 기초금액도 맞게 합산
      const relevantAccounts = metrics.filteredAccounts.filter(a => {
        if (creditMode === 'exclude') return a.accountType !== '한도약정계좌';
        if (creditMode === 'only') return a.accountType === '한도약정계좌';
        return true;
      });
      openingSum = relevantAccounts.reduce((s, a) => s + a.openingBalance, 0);
    }
    let running = openingSum;
    const ascWithBal = asc.map(t => {
      running += t.amount;
      return { ...t, runningBalance: running };
    });
    if (sortOrder === 'desc') return [...ascWithBal].reverse();
    return ascWithBal;
  }, [filtered, sortOrder, accountFilter, creditMode, metrics.filteredAccounts]);

  const summary = useMemo(() => {
    const inflow = filtered.reduce((s, t) => s + t.inflow, 0);
    const outflow = filtered.reduce((s, t) => s + t.outflow, 0);
    return { inflow, outflow, net: inflow - outflow };
  }, [filtered]);

  // 기초/기말 잔액 (UI 표시용)
  const openingBalance = useMemo(() => {
    if (accountFilter !== 'all') {
      return metrics.filteredAccounts.find(a => a.number === accountFilter)?.openingBalance || 0;
    }
    const relevantAccounts = metrics.filteredAccounts.filter(a => {
      if (creditMode === 'exclude') return a.accountType !== '한도약정계좌';
      if (creditMode === 'only') return a.accountType === '한도약정계좌';
      return true;
    });
    return relevantAccounts.reduce((s, a) => s + a.openingBalance, 0);
  }, [accountFilter, creditMode, metrics.filteredAccounts]);
  const closingBalance = openingBalance + summary.net;

  // 한도약정 거래 건수 (안내용)
  const creditTxCount = metrics.filteredTransactions.filter(t => creditAccountNumbers.has(t.accountNumber)).length;

  const resetFilters = () => {
    setSearch(''); setTypeFilter('all'); setCategoryFilter('all'); setAccountFilter('all');
    setCounterpartFilter('all'); setMinAmount('');
    setStartDate(''); setEndDate(''); setCreditMode('all');
  };

  const handleExport = () => {
    const rowsForExport = withBalance.map(t => ({
      ...t._raw,
      '누적잔액': t.runningBalance,
    }));
    const headers = [...(withBalance[0]?._headers || []), '누적잔액'];
    exportCSV(`입출금내역_${new Date().toISOString().slice(0,10)}.csv`, rowsForExport, headers);
  };

  const headers = withBalance[0]?._headers || metrics.filteredTransactions[0]?._headers || [];
  const isAmountColumn = (h) => /^(입금|출금|금액|입금액|출금액)$/.test(String(h).trim());

  // 크레딧 모드 설명 라벨
  const creditModeDesc = {
    all: '전체 거래',
    exclude: '한도약정 거래 제외',
    only: '한도약정 거래만',
  }[creditMode];

  return (
    <div className="space-y-4">
      {/* 한도약정 필터 토글 (있을 때만) */}
      {hasCreditAccounts && (
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-xs font-medium" style={{ color: COLOR.textDim }}>한도약정계좌 거래:</span>
            <div className="flex rounded-lg overflow-hidden" style={{ border: `1px solid ${COLOR.border}` }}>
              <button onClick={() => setCreditMode('all')}
                      className="px-3 py-1.5 text-xs font-medium"
                      style={{
                        background: creditMode === 'all' ? COLOR.gold : COLOR.surface,
                        color: creditMode === 'all' ? '#fff' : COLOR.textDim,
                      }}>포함 (전체)</button>
              <button onClick={() => setCreditMode('exclude')}
                      className="px-3 py-1.5 text-xs font-medium"
                      style={{
                        background: creditMode === 'exclude' ? COLOR.gold : COLOR.surface,
                        color: creditMode === 'exclude' ? '#fff' : COLOR.textDim,
                        borderLeft: `1px solid ${COLOR.border}`,
                      }}>제외</button>
              <button onClick={() => setCreditMode('only')}
                      className="px-3 py-1.5 text-xs font-medium"
                      style={{
                        background: creditMode === 'only' ? COLOR.gold : COLOR.surface,
                        color: creditMode === 'only' ? '#fff' : COLOR.textDim,
                        borderLeft: `1px solid ${COLOR.border}`,
                      }}>한도약정만</button>
            </div>
            <span className="text-[11px]" style={{ color: COLOR.textMute }}>
              · 한도약정 거래 {creditTxCount}건 ({creditAccountNumbers.size}개 계좌)
            </span>
          </div>
        </div>
      )}

      {/* 상단 요약 - 기초/입금/출금/순증감/기말 */}
      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        <KPICard label="기초금액"
                 value={formatCompactKRW(openingBalance)}
                 subValue={accountFilter !== 'all' ? '선택 계좌' : (creditMode === 'all' ? '전체 계좌' : creditModeDesc)}
                 icon={Activity} accent={COLOR.info} />
        <KPICard label="입금계" value={formatCompactKRW(summary.inflow)}
                 subValue={`${filtered.filter(t => t.inflow > 0).length}건`}
                 icon={TrendingUp} accent={COLOR.success} />
        <KPICard label="출금계" value={formatCompactKRW(summary.outflow)}
                 subValue={`${filtered.filter(t => t.outflow > 0).length}건`}
                 icon={TrendingDown} accent={COLOR.danger} />
        <KPICard label="순증감" value={formatCompactKRW(summary.net)}
                 subValue={summary.net >= 0 ? '입금 > 출금' : '출금 > 입금'}
                 icon={Activity}
                 accent={summary.net >= 0 ? COLOR.success : COLOR.danger} />
        <KPICard label="기말잔액" value={formatCompactKRW(closingBalance)}
                 subValue="기초 + 순증감"
                 icon={Wallet}
                 accent={closingBalance >= 0 ? COLOR.gold : COLOR.danger} />
      </div>

      <Card className="overflow-hidden">
        <div className="px-5 py-4 flex items-start justify-between gap-4 flex-wrap" style={{ borderBottom: `1px solid ${COLOR.border}` }}>
          <div>
            <div className="text-sm font-semibold flex items-center gap-2" style={{ color: COLOR.text }}>
              입출금 내역
              {creditMode !== 'all' && (
                <span className="text-[10px] px-2 py-0.5 rounded"
                      style={{ color: COLOR.gold, background: `${COLOR.gold}15` }}>
                  {creditModeDesc}
                </span>
              )}
            </div>
            <div className="text-xs mt-1" style={{ color: COLOR.textMute }}>
              {filtered.length}건 · 누적잔액은 과거→현재 순으로 기초금액부터 계산
            </div>
          </div>
        </div>
        <div className="px-5 py-3 flex items-center gap-2 flex-wrap" style={{ background: COLOR.bg, borderBottom: `1px solid ${COLOR.border}` }}>
          <FilterIcon size={12} style={{ color: COLOR.textMute }} />
          <Select value={typeFilter} onChange={setTypeFilter} options={[{ value: 'all', label: '전체' }, { value: 'in', label: '입금만' }, { value: 'out', label: '출금만' }]} width={100} />
          <Select value={categoryFilter} onChange={setCategoryFilter} options={categoryOptions} width={140} />
          <Select value={counterpartFilter} onChange={setCounterpartFilter} options={counterpartOptions} width={150} />
          <Select value={accountFilter} onChange={setAccountFilter} options={accountOptions} width={220} />
          <DateInput value={startDate} onChange={setStartDate} />
          <span style={{ color: COLOR.textMute }}>~</span>
          <DateInput value={endDate} onChange={setEndDate} />
          <TextInput value={minAmount} onChange={setMinAmount} placeholder="최소금액" width={110} />
          <Select value={sortOrder} onChange={setSortOrder}
                  options={[{ value: 'desc', label: '최근순' }, { value: 'asc', label: '과거순' }]} width={100} />
          <TextInput value={search} onChange={setSearch} placeholder="검색" icon={Search} width={140} />
          <div className="ml-auto flex items-center gap-2">
            <ResetFiltersButton onClick={resetFilters} />
            <DownloadButton onClick={handleExport} />
          </div>
        </div>

        <div className="overflow-x-auto" style={{ maxHeight: 640, overflowY: 'auto' }}>
          <table className="w-full text-sm">
            <thead style={{ position: 'sticky', top: 0, zIndex: 10, background: COLOR.surfaceEl }}>
              <tr>
                {headers.map(h => (
                  <th key={h} className="px-3 py-3 text-left text-xs font-medium whitespace-nowrap"
                      style={{ color: COLOR.textMute, letterSpacing: '0.04em' }}>
                    {h}
                  </th>
                ))}
                <th className="px-3 py-3 text-right text-xs font-medium whitespace-nowrap"
                    style={{ color: COLOR.gold, letterSpacing: '0.04em' }}>누적잔액 ✦</th>
              </tr>
            </thead>
            <tbody>
              {/* 기초 행 (과거순일 때 맨 위, 최근순일 때 안보임) */}
              {sortOrder === 'asc' && withBalance.length > 0 && (
                <tr style={{ background: COLOR.surfaceEl, borderTop: `1px solid ${COLOR.border}` }}>
                  <td colSpan={headers.length} className="px-3 py-2.5"
                      style={{ color: COLOR.textDim, fontStyle: 'italic', fontSize: 12 }}>
                    ← 기초금액 ({accountFilter !== 'all' ? '선택 계좌' : '전체 계좌'})
                  </td>
                  <td className="px-3 py-2.5 text-right tabular-nums font-semibold"
                      style={{ fontFamily: 'var(--mono)', color: openingBalance >= 0 ? COLOR.gold : COLOR.danger, fontSize: 12 }}>
                    {formatKRW(openingBalance)}
                  </td>
                </tr>
              )}
              {withBalance.slice(0, 1000).map((t, i) => (
                <tr key={t.id || i} style={{ borderTop: `1px solid ${COLOR.border}` }}>
                  {headers.map(h => {
                    const rawVal = t._raw?.[h] ?? '';
                    const isAmount = isAmountColumn(h);
                    // 입금/출금 컬럼: 숫자만 있으면 콤마 포맷, 0이면 공백
                    if (isAmount) {
                      const n = Number(String(rawVal).replace(/,/g, '').replace(/[^\d.-]/g, ''));
                      const displayVal = n > 0 ? Number(n).toLocaleString('ko-KR') : '';
                      const isInflow = /입금/.test(String(h));
                      return (
                        <td key={h}
                            className="px-3 py-2.5 whitespace-nowrap text-right tabular-nums"
                            style={{ color: n > 0 ? (isInflow ? COLOR.success : COLOR.danger) : COLOR.textMute,
                                     fontFamily: 'var(--mono)', fontSize: '12px' }}>
                          {displayVal}
                        </td>
                      );
                    }
                    const numeric = looksNumeric(rawVal);
                    return (
                      <td key={h}
                          className={`px-3 py-2.5 ${numeric ? 'whitespace-nowrap text-right tabular-nums' : ''}`}
                          style={{ color: COLOR.text, fontFamily: numeric ? 'var(--mono)' : 'inherit', fontSize: numeric ? '12px' : '13px' }}>
                        {rawVal}
                      </td>
                    );
                  })}
                  {/* 누적잔액 컬럼 */}
                  <td className="px-3 py-2.5 text-right tabular-nums whitespace-nowrap font-medium"
                      style={{ fontFamily: 'var(--mono)', fontSize: '12px',
                               color: t.runningBalance >= 0 ? COLOR.text : COLOR.danger,
                               background: t.runningBalance < 0 ? `${COLOR.danger}08` : 'transparent' }}>
                    {formatKRW(t.runningBalance)}
                  </td>
                </tr>
              ))}
              {/* 기말 행 (최근순일 때 맨 위... 아니 맨 아래 표시) */}
              {sortOrder === 'desc' && withBalance.length > 0 && (
                <tr style={{ background: COLOR.surfaceEl, borderTop: `2px solid ${COLOR.border}` }}>
                  <td colSpan={headers.length} className="px-3 py-2.5"
                      style={{ color: COLOR.textDim, fontStyle: 'italic', fontSize: 12 }}>
                    ← 기초금액 ({accountFilter !== 'all' ? '선택 계좌' : '전체 계좌'})
                  </td>
                  <td className="px-3 py-2.5 text-right tabular-nums font-semibold"
                      style={{ fontFamily: 'var(--mono)', color: openingBalance >= 0 ? COLOR.gold : COLOR.danger, fontSize: 12 }}>
                    {formatKRW(openingBalance)}
                  </td>
                </tr>
              )}
              {withBalance.length === 0 && (
                <tr><td colSpan={headers.length + 1} className="px-4 py-8 text-center" style={{ color: COLOR.textMute }}>데이터가 없습니다.</td></tr>
              )}
            </tbody>
          </table>
        </div>
        {withBalance.length > 1000 && (
          <div className="px-4 py-3 text-center text-xs" style={{ color: COLOR.textMute, borderTop: `1px solid ${COLOR.border}` }}>
            상위 1,000건만 표시 · 전체 {withBalance.length}건 (CSV 다운로드 시 전체 포함)
          </div>
        )}
      </Card>
    </div>
  );
}

// ============================================================================
//  PLANS VIEW
// ============================================================================
function PlansView({ metrics }) {
  const [search, setSearch] = useState('');
  const [planTypeFilter, setPlanTypeFilter] = useState('all');
  const [subjectTypeFilter, setSubjectTypeFilter] = useState('all');
  const [accountFilter, setAccountFilter] = useState('all');
  const [monthFrom, setMonthFrom] = useState('all');
  const [monthTo, setMonthTo] = useState('all');
  const [directionFilter, setDirectionFilter] = useState('all'); // all | inflow | outflow
  const [minAmount, setMinAmount] = useState('');

  const planTypeOptions = useMemo(() => {
    const types = new Set(metrics.filteredPlans.map(p => p.planType).filter(Boolean));
    return [{ value: 'all', label: '전체 계획구분' }, ...Array.from(types).sort().map(t => ({ value: t, label: t }))];
  }, [metrics.filteredPlans]);
  const subjectTypeOptions = useMemo(() => {
    const types = new Set(metrics.filteredPlans.map(p => p.subjectType).filter(Boolean));
    return [{ value: 'all', label: '전체 주체' }, ...Array.from(types).sort().map(t => ({ value: t, label: t }))];
  }, [metrics.filteredPlans]);
  const accountOptions = useMemo(() => {
    const accs = new Set(metrics.filteredPlans.map(p => p.account).filter(Boolean));
    return [{ value: 'all', label: '전체 계정과목' }, ...Array.from(accs).sort().map(a => ({ value: a, label: a }))];
  }, [metrics.filteredPlans]);
  const monthOptions = useMemo(() => {
    const months = [...new Set(metrics.filteredPlans.map(p => p.month))].filter(Boolean).sort();
    return months.map(m => ({ value: m, label: m }));
  }, [metrics.filteredPlans]);
  const monthFromOptions = [{ value: 'all', label: '시작월 (전체)' }, ...monthOptions];
  const monthToOptions = [{ value: 'all', label: '종료월 (전체)' }, ...monthOptions];
  const directionOptions = [
    { value: 'all', label: '수입+지출' },
    { value: 'inflow', label: '수입만' },
    { value: 'outflow', label: '지출만' },
  ];

  const filtered = useMemo(() => {
    let list = [...metrics.filteredPlans].sort((a, b) => a.month.localeCompare(b.month));
    if (planTypeFilter !== 'all') list = list.filter(p => p.planType === planTypeFilter);
    if (subjectTypeFilter !== 'all') list = list.filter(p => p.subjectType === subjectTypeFilter);
    if (accountFilter !== 'all') list = list.filter(p => p.account === accountFilter);
    // 월 범위 필터 (from/to 둘 다 'all'이면 전체)
    if (monthFrom !== 'all') list = list.filter(p => p.month >= monthFrom);
    if (monthTo !== 'all') list = list.filter(p => p.month <= monthTo);
    // 입/출금 방향 필터
    if (directionFilter === 'inflow') list = list.filter(p => p.inflow > 0);
    else if (directionFilter === 'outflow') list = list.filter(p => p.outflow > 0);
    // 최소 금액 필터 (수입+지출 절댓값)
    const minAmt = parseFloat((minAmount || '').replace(/[,\s]/g, ''));
    if (!isNaN(minAmt) && minAmt > 0) {
      list = list.filter(p => Math.max(p.inflow, p.outflow) >= minAmt);
    }
    if (search) {
      const s = search.toLowerCase();
      list = list.filter(p => Object.values(p._raw || {}).some(v => String(v || '').toLowerCase().includes(s)));
    }
    return list;
  }, [metrics.filteredPlans, search, planTypeFilter, subjectTypeFilter, accountFilter, monthFrom, monthTo, directionFilter, minAmount]);

  const summary = useMemo(() => {
    const inflow = filtered.reduce((s, p) => s + p.inflow, 0);
    const outflow = filtered.reduce((s, p) => s + p.outflow, 0);
    return { inflow, outflow, net: inflow - outflow };
  }, [filtered]);

  const monthlyChart = useMemo(() => {
    const m = {};
    filtered.forEach(p => {
      if (!p.month) return;
      if (!m[p.month]) m[p.month] = { month: p.month, inflow: 0, outflow: 0, net: 0 };
      m[p.month].inflow += p.inflow;
      m[p.month].outflow += p.outflow;
      m[p.month].net += p.amount;
    });
    return Object.values(m).sort((a, b) => a.month.localeCompare(b.month));
  }, [filtered]);

  const resetFilters = () => {
    setSearch(''); setPlanTypeFilter('all'); setSubjectTypeFilter('all');
    setAccountFilter('all'); setMonthFrom('all'); setMonthTo('all');
    setDirectionFilter('all'); setMinAmount('');
  };
  const headers = filtered[0]?._headers || metrics.filteredPlans[0]?._headers || [];

  const handleExport = () => {
    const rowsForExport = filtered.map(p => p._raw);
    exportCSV(`자금계획_${new Date().toISOString().slice(0,10)}.csv`, rowsForExport, headers);
  };

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-3 gap-4">
        <KPICard label="계획 수입 합계" value={formatCompactKRW(summary.inflow)} icon={TrendingUp} accent={COLOR.success} />
        <KPICard label="계획 지출 합계" value={formatCompactKRW(summary.outflow)} icon={TrendingDown} accent={COLOR.danger} />
        <KPICard label="계획 순증감" value={formatCompactKRW(summary.net)} icon={Activity} accent={summary.net >= 0 ? COLOR.success : COLOR.danger} />
      </div>

      <Card className="p-5">
        <div className="text-sm font-semibold mb-4" style={{ color: COLOR.text }}>월별 계획</div>
        <div style={{ width: '100%', height: 280 }}>
          <ResponsiveContainer>
            <ComposedChart data={monthlyChart} margin={{ top: 5, right: 10, left: 0, bottom: 5 }}>
              <CartesianGrid stroke={COLOR.border} strokeDasharray="3 3" vertical={false} />
              <XAxis dataKey="month" {...chartAxis()} />
              <YAxis {...chartAxis()} tickFormatter={v => formatCompactKRW(v)} width={70} />
              <Tooltip content={<ChartTooltip formatter={v => formatKRW(v)} />} />
              <Legend wrapperStyle={{ fontSize: 12, color: COLOR.textDim }} />
              <Bar dataKey="inflow" name="수입 계획" fill={COLOR.success} radius={[4, 4, 0, 0]} />
              <Bar dataKey="outflow" name="지출 계획" fill={COLOR.danger} radius={[4, 4, 0, 0]} />
              <Line type="monotone" dataKey="net" name="순증감" stroke={COLOR.gold} strokeWidth={2.5} dot={{ r: 3, fill: COLOR.gold }} />
              <ReferenceLine y={0} stroke={COLOR.borderHi} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      </Card>

      <Card className="overflow-hidden">
        <div className="px-5 py-4" style={{ borderBottom: `1px solid ${COLOR.border}` }}>
          <div className="text-sm font-semibold" style={{ color: COLOR.text }}>자금 계획 내역</div>
          <div className="text-xs mt-0.5" style={{ color: COLOR.textMute }}>{filtered.length}건</div>
        </div>
        <div className="px-5 py-3 flex items-center gap-2 flex-wrap" style={{ background: COLOR.bg, borderBottom: `1px solid ${COLOR.border}` }}>
          <FilterIcon size={12} style={{ color: COLOR.textMute }} />
          <Select value={planTypeFilter} onChange={setPlanTypeFilter} options={planTypeOptions} width={130} />

            <CalendarIcon size={11} style={{ color: COLOR.textMute }} />
            <Select value={monthFrom} onChange={setMonthFrom} options={monthFromOptions} width={110} />
            <span className="text-[11px]" style={{ color: COLOR.textMute }}>~</span>
            <Select value={monthTo} onChange={setMonthTo} options={monthToOptions} width={110} />
